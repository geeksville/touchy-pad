name: Setup Python, Poetry, just, and proto tooling
description: Shared setup for Python packaging and proto generation

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.12"
  install-app-deps:
    description: >
      Run `poetry install` for the app/ package after setting up tooling.
      Set to 'true' for jobs that need to import or run the touchy_pad
      Python package (e.g. build-app, build-rust's sim integration tests).
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: |
          app/pyproject.toml
          app/poetry.lock

    - name: Install Poetry
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install poetry

    - name: Install just
      uses: extractions/setup-just@v4

    - name: Install Python tooling for proto generation
      shell: bash
      run: python -m pip install grpcio-tools nanopb

    - name: Generate proto bindings
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        SYS_PYTHON: python3
      run: just build-proto-py

    - name: Install app dependencies
      if: inputs.install-app-deps == 'true'
      shell: bash
      working-directory: ${{ github.workspace }}
      run: poetry install --no-interaction --directory app
