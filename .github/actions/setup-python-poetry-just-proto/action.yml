name: Setup Python, Poetry, just, and proto tooling
description: Shared setup for Python packaging and proto generation

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: |
          app/pyproject.toml
          app/poetry.lock

    - name: Install Poetry
      shell: bash
      run: |
        curl -sSL https://install.python-poetry.org | python3 -
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install just
      uses: extractions/setup-just@v4

    - name: Install Python tooling for proto generation
      shell: bash
      run: pip install grpcio-tools nanopb

    - name: Generate proto bindings
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        SYS_PYTHON: python3
      run: just build-proto-py
