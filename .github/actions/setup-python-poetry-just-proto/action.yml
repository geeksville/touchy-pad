name: Setup Python, Poetry, just, and proto tooling
description: Shared setup for Python packaging and proto generation

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: |
          app/pyproject.toml
          app/poetry.lock

    - name: Install Poetry
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install poetry

    - name: Install just (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew install just

    - name: Install just (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends just

    - name: Install just (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: choco install just --yes --no-progress

    - name: Verify just (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: just --version

    - name: Verify just (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: just --version

    - name: Install Python tooling for proto generation
      shell: bash
      run: python -m pip install grpcio-tools nanopb

    - name: Generate proto bindings
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        SYS_PYTHON: python3
      run: just build-proto-py
