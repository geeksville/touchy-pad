name: app CI

on:
  push:
    branches: [main]
    paths:
      - "VERSION"
      - "app/**"
      - "firmware/**"
      - "proto/**"
      - "Justfile"
      - ".github/workflows/app-ci.yml"
  pull_request:
    paths:
      - "VERSION"
      - "app/**"
      - "firmware/**"
      - "proto/**"
      - "Justfile"
      - ".github/workflows/app-ci.yml"

jobs:
  # ---------------------------------------------------------------------------
  # setup: read shared metadata (firmware version) and expose it as job outputs
  # so both build-firmware and build-app can consume a consistent value without
  # duplicating the VERSION-parsing logic.
  # ---------------------------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      fw-version: ${{ steps.read-version.outputs.fw-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Read firmware version
        id: read-version
        run: echo "fw-version=$(sed -n '1p' VERSION)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # build-firmware: ESP-IDF toolchain install → proto-C generation → CMake
  # configure → firmware build → artifact upload.
  # Runs in parallel with build-app once setup completes.
  # ---------------------------------------------------------------------------
  build-firmware:
    needs: setup
    runs-on: ubuntu-latest
    env:
      IDF_VERSION: "v6.0.1"
      # Match firmware/CMakeLists.txt default BOARD for deterministic CI builds.
      FIRMWARE_BOARD: "jc4827w543"
      FW_VERSION: ${{ needs.setup.outputs.fw-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up shared Python/Poetry/just/proto tooling
        uses: ./.github/actions/setup-python-poetry-just-proto

      - name: Cache ESP-IDF toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.espressif
            ~/esp/esp-idf
          key: ${{ runner.os }}-esp-idf-${{ env.IDF_VERSION }}

      - name: Install libusb
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libusb-1.0-0

      - name: Install ESP-IDF toolchain
        run: |
          mkdir -p "$HOME/esp"
          # If cache restore produced an incomplete checkout, discard and reclone.
          if [ -d "$HOME/esp/esp-idf" ] && [ ! -f "$HOME/esp/esp-idf/export.sh" ]; then
            rm -rf "$HOME/esp/esp-idf"
          fi
          if [ ! -d "$HOME/esp/esp-idf/.git" ]; then
            git clone --branch "${IDF_VERSION}" --single-branch https://github.com/espressif/esp-idf.git "$HOME/esp/esp-idf"
          fi
          cd "$HOME/esp/esp-idf"
          ./install.sh esp32s3
          [ -f "$HOME/esp/esp-idf/export.sh" ] || { echo "error: ESP-IDF installation incomplete - export.sh not found" >&2; exit 1; }

      - name: Configure and build firmware
        working-directory: ${{ github.workspace }}
        run: |
          SYS_PYTHON="$(command -v python3)"
          export SYS_PYTHON
          just build-proto-c
          source "$HOME/esp/esp-idf/export.sh"
          idf.py -C firmware set-target esp32s3
          idf.py -C firmware -DBOARD="${FIRMWARE_BOARD}" reconfigure
          just firmware-build

      - name: Stage firmware binary
        working-directory: ${{ github.workspace }}
        run: |
          cp firmware/build/touchy_pad_v2.bin \
             "${FIRMWARE_BOARD}-${FW_VERSION}.bin"

      - name: Upload firmware binary
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ env.FIRMWARE_BOARD }}-${{ env.FW_VERSION }}
          path: ${{ github.workspace }}/${{ env.FIRMWARE_BOARD }}-${{ env.FW_VERSION }}.bin
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # build-app: Python/Poetry dependency install → proto-Py generation → lint →
  # tests → wheel/sdist package → artifact upload.
  # Runs in parallel with build-firmware once setup completes.
  # ---------------------------------------------------------------------------
  build-app:
    needs: setup
    runs-on: ubuntu-latest
    env:
      FW_VERSION: ${{ needs.setup.outputs.fw-version }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6

      - name: Set up shared Python/Poetry/just/proto tooling
        uses: ./.github/actions/setup-python-poetry-just-proto

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff lint
        run: poetry run ruff check src tests

      - name: Pytest
        run: poetry run pytest --cov=touchy_pad --cov-report=term-missing

      - name: Build wheel + sdist
        run: poetry build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: touchy-pad-dist
          path: app/dist/*

  # ---------------------------------------------------------------------------
  # finalize: download all artifacts produced by the parallel jobs and list
  # them so the run summary shows exactly what was shipped.
  # ---------------------------------------------------------------------------
  finalize:
    needs: [build-firmware, build-app]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts

      - name: List collected artifacts
        run: ls -lR artifacts
