name: app CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "firmware/**"
      - "proto/**"
      - "rust/**"
      - "Justfile"
      - ".github/workflows/app-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "firmware/**"
      - "proto/**"
      - "rust/**"
      - "Justfile"
      - ".github/workflows/app-ci.yml"

jobs:
  # ---------------------------------------------------------------------------
  # setup: read shared metadata (firmware version) and expose it as job outputs
  # so downstream jobs can consume a consistent value without duplicating the
  # VERSION-parsing logic.
  # ---------------------------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      fw-version: ${{ steps.read-version.outputs.fw-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Read firmware version
        id: read-version
        run: echo "fw-version=$(sed -n '1p' VERSION)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # install-esp-idf: clone + install the ESP-IDF toolchain once and save it to
  # the Actions cache.  All parallel build-firmware matrix cells depend on this
  # job completing first so they get a guaranteed cache hit and skip the heavy
  # install step entirely.
  # ---------------------------------------------------------------------------
  install-esp-idf:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest] # mac-os doesn't work yet macos-latest
    runs-on: ${{ matrix.os }}
    env:
      IDF_VERSION: "v6.0.1"
    steps:
      - name: Cache ESP-IDF toolchain
        id: cache-idf
        uses: actions/cache@v5
        with:
          path: |
            ~/.espressif
            ~/esp/esp-idf
          key: ${{ runner.os }}-esp-idf-${{ env.IDF_VERSION }}-esp32-esp32s3-esp32p4
          # This item is very expensive to fetch, so try to always keep it cached
          # One caveat worth knowing: save-always: true means if the ESP-IDF install step itself 
          # fails partway through (corrupted clone, network blip), the broken partial installation 
          # gets cached. The existing validity check ([ -f export.sh ] || exit 1) guards against 
          # this — a broken install fails fast before the post-job save runs, so the bad state 
          # never makes it into cache. If you ever get a mysteriously broken cache, actions/cache 
          # has a UI to manually delete cache entries by key.
          save-always: true

      - name: Install libusb (Linux)
        if: steps.cache-idf.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libusb-1.0-0

      - name: Install libusb (macOS)
        if: steps.cache-idf.outputs.cache-hit != 'true' && runner.os == 'macOS'
        run: brew install libusb

      - name: Install ESP-IDF toolchain
        if: steps.cache-idf.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/esp"
          if [ -d "$HOME/esp/esp-idf" ] && [ ! -f "$HOME/esp/esp-idf/export.sh" ]; then
            rm -rf "$HOME/esp/esp-idf"
          fi
          git clone --branch "${IDF_VERSION}" --single-branch \
            https://github.com/espressif/esp-idf.git "$HOME/esp/esp-idf"
          cd "$HOME/esp/esp-idf"
          # Install all required architectures: most boards are esp32s3,
          # esp32_2432s028rv3 (CYD2USB) is classic esp32, and
          # elecrow_p4_lcd_7 uses esp32p4.
          ./install.sh esp32,esp32s3,esp32p4
          [ -f "$HOME/esp/esp-idf/export.sh" ] || \
            { echo "error: ESP-IDF installation incomplete - export.sh not found" >&2; exit 1; }

  # ---------------------------------------------------------------------------
  # build-firmware: matrix over all supported boards.  Runs in parallel once
  # install-esp-idf has populated the cache.  Each cell restores the toolchain
  # from cache (fast) and produces BOARD.bin as an artifact.
  # ---------------------------------------------------------------------------
  build-firmware:
    needs: [setup, install-esp-idf]
    strategy:
      fail-fast: false
      matrix:
        board: [jc4827w543, waveshare_s3_lcd_7b, esp32_2432s028rv3, elecrow_p4_lcd_7, elecrow_s3_lcd_7, elecrow_s3_lcd_7_adv]
        os: [ubuntu-latest] # mac-os doesn't work yet macos-latest
    runs-on: ${{ matrix.os }}
    env:
      IDF_VERSION: "v6.0.1"
      FW_VERSION: ${{ needs.setup.outputs.fw-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up shared Python/Poetry/just/proto tooling
        uses: ./.github/actions/setup-python-poetry-just-proto

      - name: Restore ESP-IDF toolchain from cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.espressif
            ~/esp/esp-idf
          key: ${{ runner.os }}-esp-idf-${{ env.IDF_VERSION }}-esp32-esp32s3-esp32p4

      - name: Install libusb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libusb-1.0-0

      - name: Install libusb (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb

      - name: Configure and build firmware
        working-directory: ${{ github.workspace }}
        env:
          BOARD: ${{ matrix.board }}
        run: |
          SYS_PYTHON="$(command -v python3)"
          export SYS_PYTHON
          just build-proto-c
          just firmware-reconfigure "${BOARD}"
          just firmware-build

      - name: Stage firmware binary
        if: matrix.os == 'ubuntu-latest'
        env:
          BOARD: ${{ matrix.board }}
        run: cp firmware/build/touchy_pad_v2.bin "${BOARD}.bin"

      - name: Upload firmware artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.board }}
          path: ${{ matrix.board }}.bin
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # build-app: Python/Poetry dependency install → proto-Py generation → lint →
  # tests → wheel/sdist package → artifact upload.
  # Runs in parallel with install-esp-idf and build-firmware.
  #
  # Matrix runs on Linux, Windows, and macOS so we catch platform-specific
  # regressions in the host-side Python package. Only the Linux job uploads
  # the wheel/sdist artifact — the build output is platform-independent so
  # there's no need to ship three copies.
  # ---------------------------------------------------------------------------
  build-app:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up shared Python/Poetry/just/proto tooling
        uses: ./.github/actions/setup-python-poetry-just-proto
        with:
          install-app-deps: 'true'

      - name: Ruff lint
        run: poetry run ruff check src tests

      - name: Pytest
        run: poetry run pytest --cov=touchy_pad --cov-report=term-missing

      - name: Simulator works
        working-directory: ${{ github.workspace }}
        run: just app-run --sim-headless screen demo

      - name: Build wheel + sdist
        if: matrix.os == 'ubuntu-latest'
        run: poetry build

      - name: Upload build artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: touchy-pad-dist
          path: app/dist/*

  # ---------------------------------------------------------------------------
  # test-rust: run the touchy-pad Rust library test suite. The plugin binaries
  # themselves are cross-built and packaged by the reusable build-opendeck
  # workflow below.
  # ---------------------------------------------------------------------------
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Cache cargo build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Run rust api libary tests
        run: cd rust && cargo test --workspace

  # ---------------------------------------------------------------------------
  # build-opendeck: cross-build the OpenDeck plugin for every target in the
  # manifest and package the multi-platform .sdPlugin zip. Shared with
  # release.yml via the reusable workflow.
  # ---------------------------------------------------------------------------
  build-opendeck:
    uses: ./.github/workflows/build-opendeck.yml

  # ---------------------------------------------------------------------------
  # finalize: download all artifacts produced by the parallel jobs and list
  # them so the run summary shows exactly what was shipped.
  # ---------------------------------------------------------------------------
  finalize:
    needs: [build-firmware, build-app, test-rust, build-opendeck]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: List collected artifacts
        run: ls -lR artifacts
