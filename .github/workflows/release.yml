name: Release

# Triggered when a GitHub release is published via the UI.
# Runs tests, builds firmware for all boards, publishes to PyPI,
# and uploads firmware binaries as release assets.
on:
  release:
    types: [published]

jobs:
  # ---------------------------------------------------------------------------
  # test-app: lint + test + build the Python package.
  # PyPI publish and release asset upload both depend on this passing.
  # ---------------------------------------------------------------------------
  test-app:
    name: Test & build Python package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6

      - name: Set up shared Python/Poetry/just/proto tooling
        uses: ./.github/actions/setup-python-poetry-just-proto
        with:
          install-app-deps: 'true'

      - name: Ruff lint
        run: poetry run ruff check src tests

      - name: Pytest
        run: poetry run pytest --cov=touchy_pad --cov-report=term-missing

      - name: Build wheel + sdist
        run: poetry build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: app/dist/

  # ---------------------------------------------------------------------------
  # build-firmware: matrix over all supported boards.
  # Each cell produces BOARD.bin and uploads it as an artifact.
  # ---------------------------------------------------------------------------
  build-firmware:
    name: Build firmware (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [jc4827w543, waveshare_s3_lcd_7b]
    env:
      IDF_VERSION: "v6.0.1"
      FW_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up shared Python/Poetry/just/proto tooling
        uses: ./.github/actions/setup-python-poetry-just-proto

      - name: Cache ESP-IDF toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.espressif
            ~/esp/esp-idf
          key: ${{ runner.os }}-esp-idf-${{ env.IDF_VERSION }}
          save-always: true

      - name: Install libusb
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libusb-1.0-0

      - name: Install ESP-IDF toolchain
        run: |
          mkdir -p "$HOME/esp"
          if [ -d "$HOME/esp/esp-idf" ] && [ ! -f "$HOME/esp/esp-idf/export.sh" ]; then
            rm -rf "$HOME/esp/esp-idf"
          fi
          if [ ! -d "$HOME/esp/esp-idf/.git" ]; then
            git clone --branch "${IDF_VERSION}" --single-branch \
              https://github.com/espressif/esp-idf.git "$HOME/esp/esp-idf"
          fi
          cd "$HOME/esp/esp-idf"
          ./install.sh esp32s3

      - name: Configure and build firmware
        working-directory: ${{ github.workspace }}
        env:
          BOARD: ${{ matrix.board }}
        run: |
          SYS_PYTHON="$(command -v python3)"
          export SYS_PYTHON
          just build-proto-c
          just firmware-reconfigure "${BOARD}"
          just firmware-build

      - name: Merge firmware into a single flashable binary
        env:
          BOARD: ${{ matrix.board }}
        run: |
          source "$HOME/esp/esp-idf/export.sh"
          # Drive esptool directly so the merge step works even when the
          # IDF venv has a pending version drift. flash_args already has
          # bootloader/partition-table/app addr+file pairs in build/.
          cd firmware/build
          # Flatten flash_args (flags line + addr/file lines) into argv.
          mapfile -t flash_args < flash_args
          args=()
          for line in "${flash_args[@]}"; do
            read -ra words <<< "$line"
            args+=("${words[@]}")
          done
          esptool --chip esp32s3 merge-bin -o "${GITHUB_WORKSPACE}/${BOARD}.bin" "${args[@]}"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.board }}
          path: ${{ matrix.board }}.bin
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # build-opendeck: cross-build the OpenDeck plugin for every target in the
  # manifest and package the multi-platform .sdPlugin zip. Shared with
  # app-ci.yml via the reusable workflow.
  # ---------------------------------------------------------------------------
  build-opendeck:
    uses: ./.github/workflows/build-opendeck.yml

  # ---------------------------------------------------------------------------
  # publish-pypi: OIDC trusted publish — only runs after tests pass.
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: [test-app]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/touchy-pad
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  # ---------------------------------------------------------------------------
  # upload-release-assets: attach all firmware .bin files to the GitHub release.
  # Runs after all board builds succeed.
  # ---------------------------------------------------------------------------
  upload-release-assets:
    name: Upload firmware to GitHub Release
    needs: [build-firmware, build-opendeck, test-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: firmware-*
          merge-multiple: true
          path: firmware-dist/

      - name: Download plugin artifact
        uses: actions/download-artifact@v7
        with:
          name: opendeck-touchypad-plugin
          path: firmware-dist/

      - name: List firmware files
        run: ls -lh firmware-dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware-dist/*.bin
            firmware-dist/*.zip
