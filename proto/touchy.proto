// SPDX-License-Identifier: GPL-3.0-or-later
//
// Touchy-Pad host <-> device protocol.
//
// This file defines the message types exchanged over the device's custom
// USB interface (see docs/host-api.md). Two bulk USB endpoints are used:
//
//   * Command  (host -> device, bulk OUT) carries `Command` messages.
//   * Response (device -> host, bulk IN)  carries `Response` messages.
//                                         Exactly one response per command.
//
// Wire format: each message is a self-synchronising frame carrying one
// serialised `Command` or `Response` (proto3 binary):
//
//     MAGIC(2) | LEN(uint16 little-endian) | payload | CRC8(1)
//
// MAGIC is the constant byte pair 0xA5 0x5A and lets a reader re-acquire
// frame alignment after corruption or a mid-stream connect. LEN is the
// byte count of `payload`. CRC8 (polynomial 0x07, init 0x00) is computed
// over `LEN || payload` and lets the reader reject corrupt frames and
// resync. This framing is identical across every transport (USB bulk,
// TCP simulator, and serial port). See stage 64.3 in docs/design.md.
//
// Widget / screen layout types live in `widgets.proto` (same package).
//
// proto3 is used so the file is consumable both by Python (host CLI/library
// via `protoc --python_out`) and by the embedded firmware via nanopb. See
// `touchy.options` for nanopb size hints that bound dynamically-sized
// fields (strings/bytes) so nanopb can allocate them statically.

syntax = "proto3";

package touchy;

// Stage 71 — `Command.run_actions` (RunActionsCmd) carries a list of
// `Action`s defined in widgets.proto, so pull those widget/action types in.
import "widgets.proto";

// Stage 82 — `SetPreferencesCmd` carries a partial `PreferencesFile`
// (only the fields the host wants changed), so pull that type in.
import "preferences.proto";

// ---------------------------------------------------------------------------
// Common types
// ---------------------------------------------------------------------------

// Protocol-level constants clients need to discover and connect to the device.
// Storing them here means any language with a protobuf compiler gets them for
// free without a separate constants file.
enum Constants {
    CONSTANTS_UNSPECIFIED = 0;
    USB_VID               = 0x303A;  // Espressif-assigned vendor ID
    USB_PID               = 0x8369;  // touchy-pad product ID
}

// Generic result code shared by every Response.
enum ResultCode {
    RESULT_OK             = 0;
    RESULT_UNKNOWN_ERROR  = 1;
    RESULT_INVALID_ARG    = 2;
    RESULT_NOT_FOUND      = 3;
    RESULT_NO_SPACE       = 4;
    RESULT_IO_ERROR       = 5;
    RESULT_NOT_SUPPORTED  = 6;
}

// Severity of a tunneled device log line (see LogRecord). The default
// (`LOG_PRIORITY_TRACE`) is intentionally the noisiest level so a
// LogRecord arriving with `priority` unset is treated as "more verbose
// than DEBUG" rather than as a high-severity ERROR.
enum LogPriority {
    LOG_PRIORITY_TRACE = 0;
    LOG_PRIORITY_DEBUG = 1;
    LOG_PRIORITY_INFO  = 2;
    LOG_PRIORITY_WARN  = 3;
    LOG_PRIORITY_ERROR = 4;
}

// ---------------------------------------------------------------------------
// Filesystem paths (stage 51)
// ---------------------------------------------------------------------------
//
// All file paths exchanged with the device are drive-letter prefixed:
//
//   "F:host/s/home.pb"   — flash, persisted across reboots
//   "R:host/images/foo.bin"    — RAM (PSRAM), lost on reboot
//
// The drive letter is a single ASCII byte followed by a colon; everything
// after the colon is filesystem-relative (no leading slash). Hosts that
// omit the drive letter prefix get F: by default (Python wrappers add it
// for backward compatibility) — the firmware itself requires the prefix.

// Delete a single file OR an entire directory subtree at `path`. The
// drive letter selects which filesystem to operate on; the rest of the
// path is FS-relative. Examples:
//
//   FileDelete("F:host")                  -- wipe all flash host files
//   FileDelete("R:host")                  -- wipe all RAM host files
//   FileDelete("F:host/s/old.pb")   -- delete a single screen
//
// Missing files / directories are treated as success.
message FileDeleteCmd {
    string path = 1;
}

// Open a new write transaction. `path` includes the drive letter (e.g.
// "F:host/s/home.pb"). On success the response carries a
// FileOpenWriteResponse with an opaque uint32 handle that subsequent
// FileWriteCmd / FileCloseCmd messages must echo back.
//
// The device only supports one in-flight write transaction at a time;
// attempting to open a second returns RESULT_IO_ERROR.
//
// On commit (FileCloseCmd { commit = true }) the data is atomically
// renamed into place. On abort or any error mid-stream the partial
// data is discarded.
message FileOpenWriteCmd {
    string path = 1;
}

// Append a chunk of bytes to an open write transaction. `handle` must
// match a handle previously returned by FileOpenWriteCmd. `data` is
// capped at ~4 KiB (USB bulk frame budget) on the wire.
message FileWriteCmd {
    uint32 handle = 1;
    bytes  data   = 2;
}

// Finalise an in-flight write transaction. If `commit` is true the
// staged data is atomically moved into place; otherwise it's discarded.
// The handle is invalidated either way.
message FileCloseCmd {
    uint32 handle = 1;
    bool   commit = 2;
}

// Switch the currently displayed screen to the screen at `path`. The
// path must be drive-letter prefixed (e.g. "F:host/s/home.pb").
// An empty path loads the first registered screen, or the built-in
// fallback if none have been uploaded.
//
// Stage 82 — ScreenLoadCmd was removed; the host now changes the active
// screen via SetPreferencesCmd { prefs { current_screen } }, which both
// switches the screen and persists it. See preferences.proto.

// Force the backlight on (cancels any pending auto-sleep).
message ScreenWakeCmd {
}

// Stage 82 — ScreenSleepTimeoutCmd was removed; the host now sets the
// backlight auto-sleep timeout via
// SetPreferencesCmd { prefs { screen_timeout_ms } }. See preferences.proto.

// Apply a partial preferences update. `prefs` carries only the fields the
// host wants changed (every PreferencesFile value field has explicit
// presence); the device applies each present field, fires its side effect
// (backlight timeout, screen switch, log threshold, …), and persists the
// merged result. The host must never set `prefs.file_version` — that is
// written by the device on save.
message SetPreferencesCmd {
    PreferencesFile prefs = 1;
}

// Pop a single event from the device's event queue. The corresponding
// Response is the Event message itself (wrapped in `Response.event`), or an
// empty Response with code = RESULT_NOT_FOUND when the queue is empty.
//
// Used in conjunction with the asynchronous "event ready" interrupt that
// the device sends on the event endpoint when it cannot fit a full event
// payload in a single interrupt packet.
message EventConsumeCmd {
}

// Reboot the device into the ROM bootloader for firmware update.
message SysRebootBootloaderCmd {
}

// Query device protocol/firmware version. Response is SysBoardInfoResponse.
message SysBoardInfoGetCmd {
}

// Top-level command envelope. Exactly one `cmd` is set per message.
message Command {
    // Stage 82 — retired tags. `screen_load` (3) → SetPreferencesCmd
    // { current_screen }; `screen_sleep_timeout` (5) → SetPreferencesCmd
    // { screen_timeout_ms }. Never reuse these numbers.
    reserved 3, 5;
    oneof cmd {
        FileDeleteCmd          file_delete           = 1;
        FileOpenWriteCmd       file_open_write       = 2;
        ScreenWakeCmd          screen_wake           = 4;
        EventConsumeCmd        event_consume         = 6;
        FileWriteCmd           file_write            = 7;
        FileCloseCmd           file_close            = 8;
        SysRebootBootloaderCmd sys_reboot_bootloader = 9;
        SysBoardInfoGetCmd     sys_board_info_get    = 10;
        RunActionsCmd          run_actions           = 11;
        SetPreferencesCmd      set_preferences       = 12;
    }
}

// Run a list of Actions device-side, exactly as if a local widget had just
// triggered them. The device feeds each Action into the same dispatch path
// used when a widget's event fires, so ActionMacro / ActionHost /
// ActionDevice all behave identically to a locally-sourced action.
//
// Two motivating uses:
//   * test automation — drive any device-side behaviour from the host;
//   * paging — an ActionDevice{change_widget_ref(BY_PATH, path, target_id)}
//     lets the host retarget the active screen's WidgetRef (e.g. bring a
//     `host/uscr/<page>.pb` body to the front) without a screen reload.
//
// Reply is a bare Response carrying RESULT_OK (or an error code); there is
// no dedicated response payload.
message RunActionsCmd {
    repeated Action actions = 1;
}

// ---------------------------------------------------------------------------
// Responses (device -> host, on the response IN endpoint)
// ---------------------------------------------------------------------------

// Reply to SysBoardInfoGetCmd.
message SysBoardInfoResponse {
    // Wire protocol version. Increment on any wire-incompatible change.
    enum ProtocolVersion {
        option allow_alias = true;
        UNSPECIFIED = 0;
        V1 = 1;  // stage 13 baseline: SysBoardInfoGet + file/screen ops
        V2 = 2;  // stage 16: Action repeated + ActionHost/ActionMacro variants,
                 //           LvEvent.host_code added; events via host polling
        V3 = 3;  // stage 51: drive-letter paths, streaming file uploads,
                 //           FileDelete replaces FileReset/FileSave
        V4 = 4;  // stage 64.1: Response.log_record tunneled device logs
                 //           (returned in place of event_consume)
        V5 = 5;  // stage 64.3: self-synchronising frame
                 //           (MAGIC | uint16 LEN | payload | CRC8) on every
                 //           transport, replacing the bare uint32 length prefix
        V6 = 6;  // stage 65: SysBoardInfoResponse gains is_multitouch +
                 //           has_usb capability flags (additive scalar fields)
        V7 = 7;  // stage 71: SysBoardInfoResponse gains `serial`; Command
                 //           gains RunActionsCmd (both additive)
        V8 = 8;  // stage 81: SysBoardInfoResponse gains free_heap_bytes,
                 //           free_psram_bytes, fs_total_bytes, fs_used_bytes
        V9 = 9;  // stage 82: SetPreferencesCmd replaces ScreenSleepTimeoutCmd
                 //           + ScreenLoadCmd; PreferencesFile fields optional
        CURRENT = 9;  // alias: always equals the latest defined version
    }
    ProtocolVersion protocol_version = 1;
    uint32 firmware_version = 2;    // monotonically-increasing build number
    string firmware_version_str = 3; // human-readable "1.2.3" or git hash
    string board_name = 4;           // CMake BOARD name, e.g. "jc4827w543"; "sim" in simulator
    // Active display panel resolution in pixels. Used by host-side
    // adapters that need to lay out a UI sized for the device (e.g.
    // TouchyDeck picks its StreamDeck-emulation grid dimensions from
    // these so each key is drawn at native 72x72 px). For the
    // simulator these report the configured sim canvas size.
    uint32 display_width  = 5;
    uint32 display_height = 6;
    // Stage 65 capability flags. Let host-side adapters/simulators adapt
    // to the board without hard-coding board names.
    // True when the touch panel reports >1 simultaneous contact (capacitive
    // GT911) vs. a single-point resistive panel (XPT2046).
    bool is_multitouch = 7;
    // True when the device has a native USB-OTG port (HID + vendor-bulk
    // transport). False on classic-ESP32 boards reached only via a UART
    // bridge, where the protocol rides a serial port and HID is unavailable.
    bool has_usb = 8;
    // Stage 71 — stable device serial. On real hardware this is derived
    // from the factory MAC, formatted "txxxxxxxxxxxx" (leading 't' + 12
    // lowercase hex digits, no separators), and is also reported as the
    // USB string descriptor iSerialNumber so the OS and
    // the vendor transport agree. The simulator reports a fixed "tsim001".
    // Host-side enumeration uses this as the device's stable identity.
    string serial = 9;
    // Stage 81 — runtime memory / storage headroom, sampled at query time.
    // All values are a snapshot; they change as the device allocates and
    // writes files.
    uint64 free_heap_bytes  = 10;  // free internal RAM (MALLOC_CAP_INTERNAL)
    uint64 free_psram_bytes = 11;  // free PSRAM (MALLOC_CAP_SPIRAM); 0 if none
    uint64 fs_total_bytes   = 12;  // LittleFS (F:) capacity in bytes
    uint64 fs_used_bytes    = 13;  // LittleFS (F:) bytes currently in use
}

// Reply to FileOpenWriteCmd. Carries the handle the host must echo
// back on subsequent FileWriteCmd / FileCloseCmd messages.
message FileOpenWriteResponse {
    uint32 handle = 1;
}

// Reply to EventConsumeCmd. Carries the popped event, if any. When the
// queue is empty, the outer Response sets `code = RESULT_NOT_FOUND` and
// leaves `event` unset.
message EventConsumeResponse {
    LvEvent event = 1;
}

// Stage 64.1 — a single tunneled device log line, delivered to the host
// as a `Response.log_record` payload alongside the normal
// `EventConsumeResponse` flow. The host's existing
// `EventConsumeCmd`-polling loop drains both queues; the dispatcher
// returns either an event, a log record, or `RESULT_NOT_FOUND` when
// both are empty.
//
// `num_dropped` is normally zero. When the firmware's log ring buffer
// overflows or a log is emitted from an ISR / re-entrant context, the
// record is silently discarded and a per-pending counter is bumped;
// the next successfully-enqueued record folds that count into its
// `num_dropped` field so no loss is silent on the host side.
message LogRecord {
    LogPriority priority     = 1;  // unset == LOG_PRIORITY_TRACE
    string      message      = 2;  // pre-formatted line, no trailing '\n'
    uint32      num_dropped  = 3;  // records dropped since last success
    uint32      timestamp_ms = 4;  // esp_timer_get_time()/1000 at enqueue,
                                   // truncated to uint32 (wraps every ~49d);
                                   // 0 on sim
    string      tag          = 5;  // ESP_LOG TAG (best-effort, may be empty)
}

// Top-level response envelope. Every command is followed by exactly one
// Response on the response IN endpoint. `code` is the generic result, and
// `payload` (optional) carries any command-specific data.
message Response {
    ResultCode code = 1;
    oneof payload {
        SysBoardInfoResponse  sys_board_info  = 2;
        EventConsumeResponse  event_consume   = 3;
        FileOpenWriteResponse file_open_write = 4;
        // Stage 64.1 — tunneled device log line. Can be returned in
        // place of `event_consume` from an `EventConsumeCmd` reply
        // when the event queue is empty but the log queue is not.
        LogRecord             log_record      = 5;
    }
}

// ---------------------------------------------------------------------------
// Events (device -> host, on the event interrupt IN endpoint)
// ---------------------------------------------------------------------------

// A lightly-wrapped lvgl event delivered to the host as the payload of an
// EventConsumeResponse. The firmware only emits these for widget triggers
// that carry an `ActionHost` in their layout; pure `ActionMacro` triggers
// are handled entirely device-side and never enter the queue.
//
// Fields:
//   * `code`          — `lv_event_code_t` value
//                       (https://lvgl.io/docs/open/api/core/lv_event_h).
//   * `user_data`     — the originating `Widget.id` (so the host knows which
//                       widget fired without consulting a side table).
//   * `host_code`     — the `ActionHost.code` from the layout that triggered
//                       the forward; host libraries dispatch on this to find
//                       the registered Python handler.
//   * `state`         — per-widget current value (unset for simple buttons):
//                         `value`   — slider: current int32 position.
//                         `checked` — switch / checkbox: checked state.
message LvEvent {
    uint32 code      = 1;
    string user_data = 2;
    oneof state {
        int32 value   = 3;  // slider: current position
        bool  checked = 5;  // switch / checkbox: checked state
    }
    uint32 host_code = 4;
}

// Mailbox notification sent on the event interrupt-IN endpoint.
//
// The endpoint's max packet size is small (16 B) and on-device flow control
// for variable-size payloads adds complexity, so the device always sends
// just the `event_ready` flag. On receipt the host drains the device queue
// by issuing `EventConsumeCmd` repeatedly until the device responds with
// `RESULT_NOT_FOUND`.
message Event {
    oneof evt {
        // "There is at least one event waiting; please send EventConsumeCmd
        // until you get RESULT_NOT_FOUND."
        bool event_ready = 1;
    }
}

// ---------------------------------------------------------------------------
// Service definition
// ---------------------------------------------------------------------------
//
// See top-of-file comment for the unary-RPC <-> command/response mapping.
//
// nanopb ignores `service` blocks, so adding this here has no embedded-side
// cost.
service Touchy {
    // ----- Generic filesystem (XML, images, fonts, …) -----------------
    // Stage 51: file writes are streamed via FileOpenWrite + FileWrite*
    // + FileClose triplet; the Python client wraps this back into a
    // single `file_save(path, data)` call.
    rpc FileDelete(FileDeleteCmd) returns (Response);
    rpc FileOpenWrite(FileOpenWriteCmd) returns (Response);
    rpc FileWrite(FileWriteCmd) returns (Response);
    rpc FileClose(FileCloseCmd) returns (Response);

    // ----- Screen management ------------------------------------------
    // Stage 82 — ScreenLoad removed; use SetPreferences { current_screen }.

    // ----- Backlight / power ------------------------------------------
    rpc ScreenWake(ScreenWakeCmd) returns (Response);
    // Stage 82 — ScreenSleepTimeout removed; use
    // SetPreferences { screen_timeout_ms }.

    // ----- Preferences ------------------------------------------------
    rpc SetPreferences(SetPreferencesCmd) returns (Response);

    // ----- System -----------------------------------------------------
    rpc SysRebootBootloader(SysRebootBootloaderCmd) returns (Response);
    rpc SysBoardInfoGet(SysBoardInfoGetCmd) returns (Response);

    // ----- Async events -----------------------------------------------
    rpc EventConsume(EventConsumeCmd) returns (Response);
}

