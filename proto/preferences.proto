// SPDX-License-Identifier: GPL-3.0-or-later
//
// Touchy-Pad per-device preferences.
//
// Persisted as `PreferencesFile` at `/prefs/prefs.pb` on the device
// filesystem. Stage 82 â€” the host also sends this message (wrapped in
// `SetPreferencesCmd`) to change settings: every value field has explicit
// presence (`optional`), so the host sets only the fields it wants changed
// and the device merges them into its master settings. The host must never
// set `file_version` â€” that is written only by the device on save. The
// on-device `Prefs` singleton reads/writes this file on boot and whenever a
// setting changes.
//
// nanopb field options live in `preferences.options`.

syntax = "proto3";

package touchy;

// Persisted device preferences.
message PreferencesFile {
    // Schema version â€” increment on backward-incompatible changes.
    enum Version {
        option allow_alias = true;
        UNSPECIFIED = 0;
        V1 = 1;       // initial format: file_version + screen_timeout_ms
        V2 = 2;       // Stage 24: + current_screen (last loaded screen name)
        V3 = 3;       // Stage 51: current_screen now stores a full
                      //           drive-letter path (e.g. "F:host/s/home.pb")
        V4 = 4;       // Stage 82: fields optional; + min_log_level,
                      //           boot_delay_s
        V5 = 5;       // Stage 94: + backlight_level
        V6 = 6;       // Stage lb6: + board_config (LED-panel geometry)
        V7 = 7;       // Stage lb8: + network (WiFi + HTTP(S) API config)
        V8 = 8;       // Stage lb9: network.tls_psk_key removed (mTLS via files)
        V9 = 9;       // Stage lb10: tiled panel chains + per-panel wiring flags
        CURRENT = 9;  // alias: always equals the latest defined version
    }

    // Written on every save so forward migrations can detect old files.
    // Device-owned: the host must never set this in a SetPreferencesCmd.
    Version file_version = 1;

    // Auto-sleep backlight timeout in milliseconds. 0 = disabled (backlight
    // stays on indefinitely). Set via SetPreferencesCmd from the host.
    optional uint32 screen_timeout_ms = 2;

    // Full drive-letter path of the most-recently-loaded screen, e.g.
    // "F:host/s/home.pb". Updated by the firmware on every
    // successful `screens_load` so a reboot restores the screen the user
    // was looking at. Empty means "no preference â€” load the first
    // discovered screen, then the built-in fallback". If the recorded
    // path lives on R: (RAM) it will be missing after a reboot; the
    // firmware treats that as any other missing-screen and falls back
    // to the default. Setting this via SetPreferencesCmd also switches
    // the currently displayed screen.
    optional string current_screen = 3;

    // Stage 82 â€” minimum log priority queued for the host. Stores a
    // `touchy.LogPriority` numeric value (0=TRACE â€¦ 4=ERROR). Log lines
    // below this threshold are dropped device-side and never tunneled to
    // the host. Default (when unset / first boot) is ERROR. Kept as a
    // plain uint32 rather than the LogPriority enum to avoid a circular
    // import with touchy.proto (which imports this file).
    optional uint32 min_log_level = 4;

    // Stage 82 â€” seconds to sleep very early in boot before bringing up
    // the UI, to give a host debug-log connection time to attach so the
    // earliest log lines are not missed. 0 (default) disables the delay.
    optional uint32 boot_delay_s = 5;

    // Stage 94 â€” display backlight brightness as a percentage, 0 = off â€¦
    // 100 = max. The device maps this into its panel-specific PWM duty
    // (each board may define a minimum-visible duty). Default (when unset
    // / first boot) is 100. Set via SetPreferencesCmd from the host.
    optional uint32 backlight_level = 6;

    // Stage lb6 â€” hardware description programmed onto the device (LED
    // panel geometry, etc.). Persisted like any other pref but has no
    // live side effect: it is read once at boot by display_init(). A
    // fresh device with no board_config brings up no LED display. Set
    // via SetPreferencesCmd from the host (typically `pref from-template`).
    optional BoardConfig board_config = 7;

    // Stage lb8 â€” optional WiFi + network-API configuration. When the
    // WiFi credentials are set the device joins that network, brings up
    // mDNS, and starts the HTTP(S) command API. Persisted like any other
    // pref; WiFi bring-up/teardown is a live side effect of apply_partial
    // (so `pref json-set` can join a network without a reboot).
    optional NetworkConfig network = 8;
}

// Stage lb8/lb9 â€” optional WiFi + network-API configuration. Every field
// is `optional`: an unset field leaves the device's current value
// unchanged on a partial update. Clearing wifi_ssid (set to "")
// disconnects and stops the network servers. The WiFi PSK is stored in
// plaintext on flash like any other pref.
//
// HTTPS security is *not* configured here: Stage lb9 secures the network
// API with mutual TLS, and the certificate/key PEMs are uploaded as
// files (F:tls/server.crt, F:tls/server.key, F:tls/client_ca.crt) via the
// normal FileWrite API rather than as prefs fields. The device serves
// HTTPS-with-mTLS when that cert set is present and plaintext HTTP
// otherwise. Tag 4 (the retired lb8 tls_psk_key) is reserved.
message NetworkConfig {
    optional string wifi_ssid   = 1;   // 2.4 GHz SSID to join
    optional string wifi_psk    = 2;   // WPA2 passphrase (plaintext)
    optional string hostname    = 3;   // mDNS name; unset â†’ touchypad_<serial>
    // Stage lb14 â€” skip HTTPS even when mTLS certs are present; serves plain
    // HTTP on port 80 instead. Useful for debugging without a client cert.
    optional bool   no_tls      = 5;
}

// One physical LED matrix, one link in a daisy-chained data line. Origin
// (0,0) is the matrix's top-left; the flags describe how that logical grid
// is wired to the physical LED order within this matrix. The data GPIO is
// on the enclosing PanelChain (Stage lb10 moved it there). Defaults
// reproduce the pre-lb10 frozen wiring: only column-snaking on.
message Panel {
    uint32 width  = 1;   // logical pixel columns
    uint32 height = 2;   // logical pixel rows

    // Physical-wiring flags. `cols_snaked` is `optional` because its
    // default is TRUE (proto3 bools default false), so UNSET means true and
    // present-but-false means "columns run straight". The rest default false.
    bool          rows_snaked  = 3;  // odd rows run rightâ†’left
    optional bool cols_snaked  = 4;  // odd cols run bottomâ†’top (UNSET â‡’ true)
    bool          row_major    = 5;  // index = row*width+col (else col-major)
    bool          cols_flipped = 6;  // mirror X across the whole matrix
    bool          rows_flipped = 7;  // mirror Y across the whole matrix
}

// A chain of up to 4 panels sharing one data GPIO, tiled into one surface.
// Panels are laid out in chain order (panel 0 is the first matrix on the
// data line). `tile_by_row` picks the tiling axis; e.g. 3Ă—{32,8} tiles to a
// 96Ă—8 surface (horizontal) or a 32Ă—24 surface (vertical).
message PanelChain {
    repeated Panel panels      = 1;  // chain order; capped max_count:4
    uint32         gpio        = 2;  // data GPIO for the whole chain
    bool           tile_by_row = 3;  // false â‡’ tile horizontally (default)
}

// One LVGL display surface. For now exactly one PanelChain (capped in
// preferences.options); multi-chain / multi-display tiling is deferred.
message Display {
    repeated PanelChain chains = 1;
}

// Build/hardware description programmed onto the device. For now just an
// array of at most one Display (capped in preferences.options).
message BoardConfig {
    repeated Display displays = 1;
}
