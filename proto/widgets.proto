// SPDX-License-Identifier: GPL-3.0-or-later
//
// Widget / screen layout types for the Touchy-Pad declarative UI system.
//
// These messages describe LVGL screens authored on the host and uploaded to
// the device via `FileSaveCmd` (see `touchy.proto`). The device decodes them
// from `screens/<name>.pb` files using nanopb; the host DSL in
// `app/src/touchy_pad/screens.py` serialises them using protobuf-python.
//
// See docs/why-not-xml.md for the rationale behind protobuf over XML.

syntax = "proto3";

package touchy;

// ---------------------------------------------------------------------------
// Stage 15 — declarative screen layouts (host-uploaded, on-device rendered)
// ---------------------------------------------------------------------------
//
// A `Screen` describes a single LVGL screen as a flat list of `Widget`s
// plus an optional `Layout`. The host serialises one `Screen` per file
// and uploads it via `FileSaveCmd` to `screens/<name>.pb`; the device
// caches the encoded bytes and instantiates LVGL objects when
// `ScreenLoadCmd("<name>")` arrives.
//
// See docs/why-not-xml.md for the rationale behind protobuf over XML.

// Pixel-space placement. When the parent screen has Layout.kind == ABSOLUTE
// (the default) all four fields are honoured; under ROW/COL/GRID, only `w`
// and `h` are used (a zero value means "size to content").
message Rect {
    int32 x = 1;
    int32 y = 2;
    int32 w = 3;
    int32 h = 4;
}

// LVGL style selector bits. A `Style.for_state` value is the bitwise OR
// of any combination of these constants, and is passed verbatim to
// `lv_obj_add_style(obj, st, selector)` on the device.
//
// The enum is a flattened union of two distinct LVGL concepts:
//
//   * STATE_* bits (0x0000..0x00FF, plus the user-state bits LVGL
//     reserves at 0x1000..0x8000) describe widget state — PRESSED,
//     FOCUSED, DISABLED, etc. Multiple state bits can be OR'd together to
//     describe complex states (e.g. PRESSED | FOCUSED).
//   * PART_* bits (0x010000..0x0F0000) pick which sub-part of a composite
//     widget the style targets (the slider knob, the scrollbar, ...).
//     They are not states, but LVGL packs them into the same
//     `lv_style_selector_t` so they can be OR'd onto a state mask in the
//     same `for_state` field.
//
// `STATE_DEFAULT == 0` and `PART_MAIN == 0`, so leaving `for_state` unset
// (proto3 zero) means "apply to the main part in the default state" —
// the most common case.
//
// See https://lvgl.io/docs/open/common-widget-features/styles/overview
// for the full state-precedence and part-selection rules.
enum LvState {
    option allow_alias = true;
    // ---- states (lv_state_t) ----
    LV_STATE_DEFAULT   = 0x0000;
    LV_STATE_CHECKED   = 0x0001;
    LV_STATE_FOCUSED   = 0x0002;
    LV_STATE_FOCUS_KEY = 0x0004;
    LV_STATE_EDITED    = 0x0008;
    LV_STATE_HOVERED   = 0x0010;
    LV_STATE_PRESSED   = 0x0020;
    LV_STATE_SCROLLED  = 0x0040;
    LV_STATE_DISABLED  = 0x0080;
    // User states (custom) intentionally omitted — add when needed.
    // ---- parts (lv_part_t) ----
    LV_PART_MAIN       = 0x000000;
    LV_PART_SCROLLBAR  = 0x010000;
    LV_PART_INDICATOR  = 0x020000;
    LV_PART_KNOB       = 0x030000;
    LV_PART_SELECTED   = 0x040000;
    LV_PART_ITEMS      = 0x050000;
    LV_PART_CURSOR     = 0x060000;
    LV_PART_ANY        = 0x0F0000;
}

// Curated subset of `lv_style_prop_t` values that a `Transition` may
// interpolate. Wire IDs are stable; the firmware translates each into
// the matching `LV_STYLE_*` constant at decode time so the wire format
// stays insulated from LVGL version drift / `LV_USE_*` build flags.
enum StyleProp {
    STYLE_PROP_UNSET             = 0;
    STYLE_PROP_BG_COLOR          = 1;
    STYLE_PROP_BG_OPA            = 2;
    STYLE_PROP_RADIUS            = 3;
    STYLE_PROP_BORDER_WIDTH      = 4;
    STYLE_PROP_BORDER_COLOR      = 5;
    // Per-side pad props. LVGL has no single "all sides" transition
    // prop; pad-everywhere transitions need all four entries.
    STYLE_PROP_PAD_TOP           = 6;
    STYLE_PROP_TEXT_COLOR        = 7;
    STYLE_PROP_IMAGE_RECOLOR     = 8;
    STYLE_PROP_IMAGE_RECOLOR_OPA = 9;
    STYLE_PROP_TRANSFORM_WIDTH   = 10;
    STYLE_PROP_TRANSFORM_HEIGHT  = 11;
    STYLE_PROP_PAD_BOTTOM        = 12;
    STYLE_PROP_PAD_LEFT          = 13;
    STYLE_PROP_PAD_RIGHT         = 14;
}

// Animation path (easing curve) selector. Maps 1-to-1 onto the
// `lv_anim_path_*` built-ins. Default = LINEAR.
enum AnimPath {
    ANIM_PATH_LINEAR      = 0;
    ANIM_PATH_EASE_IN     = 1;
    ANIM_PATH_EASE_OUT    = 2;
    ANIM_PATH_EASE_IN_OUT = 3;
    ANIM_PATH_OVERSHOOT   = 4;
    ANIM_PATH_BOUNCE      = 5;
    ANIM_PATH_STEP        = 6;
}

// Style-property transition. Mirrors `lv_style_transition_dsc_t`: when
// the parent `Style` is added/removed from a widget's selector match
// (e.g. on entering/leaving `LV_STATE_PRESSED`), LVGL animates every
// `prop` in this list from the previous value to the new one along
// `path` over `duration_ms`, starting after `delay_ms`.
//
// The classic "bind on the default style → covers both directions"
// pattern works: attach one Transition to the `for_state = 0` Style
// and LVGL uses it for both press and release. Attach a second
// (different) Transition to the `for_state = LV_STATE_PRESSED` Style to
// get an asymmetric in/out animation (fast in, slow out).
//
// See https://lvgl.io/docs/open/main-modules/animation and the
// `lv_example_imagebutton_1` / `lv_example_style_11` examples.
message Transition {
    repeated StyleProp props = 1;       // properties to interpolate
    AnimPath  path           = 2;       // easing; default = LINEAR
    uint32    duration_ms    = 3;
    uint32    delay_ms       = 4;
}

// Cosmetic overrides applied to a widget via an `lv_style_t` instance
// and `lv_obj_add_style(obj, st, for_state)`. Treat one `Style` message
// as ≈ one `lv_style_t`: each populated scalar maps to one
// `lv_style_set_<prop>()` call; fields left unset are skipped and
// inherit the theme's value.
//
// Every visual field is `optional` so an explicit zero (e.g.
// `bg_color = 0x000000`, `transform_width = 0`) round-trips faithfully
// instead of being indistinguishable from "unset".
//
// `for_state` is the `lv_style_selector_t` selector passed to
// `lv_obj_add_style`. It is the OR of any `LvState` (state + part) bits;
// leaving it unset targets PART_MAIN / STATE_DEFAULT (selector = 0).
//
// Stack multiple `Style` messages on a single `Widget.styles` to attach
// different properties to different states / parts (e.g. one Style for
// the default look, another with `for_state = LV_STATE_PRESSED` to
// change the background while pressed). Later entries win on ties;
// state precedence still applies as documented by LVGL.
//
// Colours are packed 0xRRGGBB; the top byte is ignored.
message Style {
    optional uint32 bg_color        = 1;
    optional int32  radius          = 2;
    optional int32  border_w        = 3;
    optional int32  pad             = 4;
    optional uint32 text_color      = 5;
    // Bitwise OR of `LvState` values; 0 = PART_MAIN | STATE_DEFAULT.
    uint32          for_state       = 6;
    // image recolor (0xRRGGBB) — used to tint icons / image buttons.
    optional uint32 recolor         = 7;
    // image recolor opacity, 0..255 (255 = full tint). LVGL `LV_OPA_*`
    // constants are valid (e.g. 76 ≈ `LV_OPA_30`).
    optional uint32 recolor_opa     = 8;
    // pixels added to the widget's drawn width while this style is
    // active; commonly negative for "shrink on press" or positive for
    // "grow on press". Maps to `lv_style_set_transform_width`.
    optional int32  transform_width = 9;
    // Animate the listed properties when this style is added / removed
    // from the widget's selector match. See `Transition` doc-comment.
    optional Transition transition  = 10;
}

// Single device-side keystroke step inside an `ActionMacro`.
//
// `keycode` is a raw USB HID usage code from page 0x07 (Keyboard / Keypad);
// see https://usb.org/sites/default/files/hut1_22.pdf for the full table.
// `modifiers` is the standard 8-bit modifier mask sent in byte 0 of the
// boot-keyboard report:
//     bit 0: LCTRL  bit 1: LSHIFT  bit 2: LALT   bit 3: LGUI
//     bit 4: RCTRL  bit 5: RSHIFT  bit 6: RALT   bit 7: RGUI
message KeyEvent {
    uint32 keycode   = 1;
    uint32 modifiers = 2;
}

// Relative mouse motion step inside an `ActionMacro`. All three components
// are signed; `wheel` is the standard HID vertical wheel.
message MouseMove {
    int32 dx    = 1;
    int32 dy    = 2;
    int32 wheel = 3;
}

// A single step inside an `ActionMacro`. Steps run in order on a dedicated
// macro task; between any two steps the runner waits for the currently-
// configured per-step delay (default 10 ms; see `set_delay_ms`).
message MacroStep {
    oneof step {
        KeyEvent  key_down          = 1;   // press only — chord setup
        KeyEvent  key_up            = 2;   // release only — chord teardown
        KeyEvent  key_tap           = 3;   // down then up
        uint32    mouse_button_down = 4;   // bitmask: L=1,R=2,M=4
        uint32    mouse_button_up   = 5;
        uint32    mouse_click       = 6;   // down then up
        MouseMove mouse_move        = 7;
        // Update the sticky inter-step delay (ms). Applies to every step
        // *after* this one until the next `set_delay_ms`.
        uint32    set_delay_ms      = 8;
        // One-shot extra pause (ms). Does not affect the sticky delay.
        uint32    delay_ms          = 9;
    }
}

// A device-side macro: a list of HID keyboard / mouse events with delays.
// Replays entirely on the device — no host round-trips.
message ActionMacro {
    repeated MacroStep steps = 1;   // see widgets.options for caps
}

// A host-handled action: the device forwards an `LvEvent` with the
// originating widget's id in `user_data`, `code` in `host_code`, and any
// relevant per-widget value (slider position, switch state, ...) packed
// into `extra`. The host library dispatches on `host_code` to a registered
// Python callback.
message ActionHost {
    uint32 code = 1;
}

// Behaviour attached to a widget event trigger (click / value changed /
// ...). Each widget event slot holds a list of Actions; the device runs
// them in order. Mixing host- and macro-actions in one list is fine.
message Action {
    oneof kind {
        ActionHost  host  = 1;
        ActionMacro macro = 2;
    }
}

// Absolute (default) screen layout: every widget is positioned exactly
// where its `Widget.layout.rect` says. Widgets without a `rect` default
// to (0, 0) with "size-to-content" dimensions.
message LayoutAbsolute {
}

// Flex screen layout (lv_obj_set_flex_flow). `flow` selects the LVGL flex
// flow mode; `gap` sets the pixel gap between children.
message LayoutFlex {
    // Maps 1-to-1 onto lv_flex_flow_t.
    enum Flow {
        ROW                 = 0;
        COLUMN              = 1;
        ROW_WRAP            = 2;
        ROW_REVERSE         = 3;
        ROW_WRAP_REVERSE    = 4;
        COLUMN_WRAP         = 5;
        COLUMN_REVERSE      = 6;
        COLUMN_WRAP_REVERSE = 7;
    }
    Flow   flow = 1;
    uint32 gap  = 2;    // pixels between children
}

// Grid screen layout (lv_obj_set_layout(…, LV_LAYOUT_GRID)).
//
//   * `cols` columns, each LV_GRID_FR(1) wide. 0 → treated as 1.
//   * `rows` rows, each LV_GRID_FR(1) tall. 0 → single content-sized row.
//   * `gap` pixels between all tracks.
//
// Every widget should carry `Widget.layout.cell`; widgets without one
// land in (col=0, row=0) with span 1×1.
message LayoutGrid {
    uint32 cols = 1;
    uint32 rows = 2;    // 0 = CONTENT-sized single row track
    uint32 gap  = 3;    // pixels between tracks
}

// Grid placement for a widget whose parent uses Layout.kind == GRID.
// `col_span` / `row_span` default to 1 when absent. Widgets without a
// `GridCell` land in (col=0, row=0) with span 1x1.
message GridCell {
    uint32 col               = 1;
    uint32 row               = 2;
    optional uint32 col_span = 3;   // absent → 1
    optional uint32 row_span = 4;   // absent → 1
}

// ----- Widget kinds -----
//
// Each kind carries only the attributes that need to round-trip from the
// authoring DSL. Visual styling lives on the enclosing `Widget.style`;
// placement on `Widget.layout` (rect or cell).

message Button {
    string text             = 1;
    repeated Action on_click = 2;   // see widgets.options for max count
}

// Text alignment within a label widget. Maps directly to lv_text_align_t.
enum TextAlign {
    TEXT_ALIGN_AUTO   = 0;  // follow LVGL default / locale direction
    TEXT_ALIGN_LEFT   = 1;
    TEXT_ALIGN_CENTER = 2;
    TEXT_ALIGN_RIGHT  = 3;
}

message Label {
    string text      = 1;
    // 0 = theme default. Otherwise: closest available Montserrat size
    // compiled into the firmware (see CONFIG_LV_FONT_MONTSERRAT_* in
    // firmware/sdkconfig.defaults).
    int32     font_size  = 2;
    TextAlign text_align = 3;
}

message Slider {
    int32  min                = 1;
    int32  max                = 2;
    int32  value              = 3;
    repeated Action on_change = 4;
}

message Switch {
    bool   on                 = 1;
    repeated Action on_change = 2;
}

message Checkbox {
    string text               = 1;
    bool   checked            = 2;
    repeated Action on_change = 3;
}

message Image {
    // Path to a previously-uploaded image, relative to /from_host/
    // (e.g. "img/avatar.png"). The firmware always supports its native
    // LVGL `.bin` format; other decoders (BMP/PNG/JPG) require the
    // matching `LV_USE_*` flag in sdkconfig.
    string asset = 1;
    // Scale factor in 1/256 units (256 = 100%, 512 = 2x, 128 = 50%).
    // Mapped to `lv_image_set_scale`. When unset, the image is rendered
    // at its native size.
    optional uint32 scale = 2;
    // Rotation in tenths of a degree, clockwise (1800 = 180°).
    // Mapped to `lv_image_set_rotation`. When unset, no rotation is
    // applied (LVGL default).
    optional int32 rotation = 3;
}

// Clickable image. Like `Button` (with `on_click` actions) but renders an
// image asset instead of a styled text label. The released-state image
// is described by an embedded `Image` (so it accepts `asset` / `scale`
// / `rotation`). `pressed` is an optional `Image` shown while the
// button is held — omit it to leave the LVGL PRESSED state unset (LVGL
// then renders the released image while pressed). `pressed` can carry
// its own `scale` / `rotation` so e.g. a button can shrink slightly on
// press.
message ImageButton {
    Image released                 = 1;   // required — at minimum `asset`
    optional Image pressed         = 2;   // optional press-state image
    repeated Action on_click       = 3;   // see widgets.options for cap
}

message Arc {
    int32 min   = 1;
    int32 max   = 2;
    int32 value = 3;
}

message Spacer {
}

// Multitouch trackpad surface. Touches inside the widget are converted to
// USB HID mouse events on-device (one-finger drag -> move,
// 1/2/3-finger tap -> left/right/middle click, two-finger drag ->
// scroll wheel). No host round-trip, no Actions: the widget runs entirely
// device-side.
//
// To see live gesture feedback, place a `LogLine` somewhere on the
// same screen; the trackpad pushes a short status line on every
// recognised gesture to the shared device log sink.
//
// Optional eye-candy: `touch_ripple` / `tap_ripple` spawn an animated
// circle at each finger position. Ripple color is picked at spawn time
// from the *_touch_color fields based on the current finger count
// (1→left, 2→right, 3+→middle), matching the click convention.
message Trackpad {
    // Invert the vertical scroll direction for two-finger drag.
    // Default (false) means dragging fingers downward scrolls content down
    // (Linux/Windows style). Set true for macOS "natural scrolling" where
    // fingers-down scrolls content up.
    bool scroll_invert_y = 1;
    // Invert the horizontal scroll / pan direction for two-finger drag.
    // Default (false) means fingers-right pans content right.
    bool scroll_invert_x = 2;

    // Ripple colors (0xRRGGBB). Picked at ripple-spawn time by the *current*
    // finger count when a new finger lands, or by the tap's finger count
    // when a tap is recognised. Unset → built-in defaults
    // (cyan / orange / magenta).
    optional uint32 left_touch_color   = 3;  // 1-finger / left-click
    optional uint32 right_touch_color  = 4;  // 2-finger / right-click
    optional uint32 middle_touch_color = 5;  // 3+-finger / middle-click

    // Animation spawned at each new finger touch-down. Unset → disabled.
    optional RippleAnimation touch_ripple = 6;
    // Burst animation spawned at the centroid of the touched fingers
    // when a tap (no-drag, short-hold) is recognised on release. Unset
    // → disabled. Typically a larger / brighter / ring-style ripple so
    // taps visibly punctuate the press.
    optional RippleAnimation tap_ripple   = 7;
}

// Reusable touch-feedback ripple. Animates a circle from radius 0 →
// `max_radius` while fading its opacity from `start_opa` → 0 over
// `duration_ms`. Color is *not* part of this message — the parent
// widget (e.g. Trackpad) supplies it at spawn time so the same
// RippleAnimation can be reused across gestures with different colors.
message RippleAnimation {
    optional uint32 start_opa    = 1;  // 0-255; default 200
    optional uint32 max_radius   = 2;  // px;    default 40
    optional uint32 duration_ms  = 3;  // ms;    default 350
    AnimPath        path         = 4;  // easing; default LINEAR
    // Border thickness in px. 0 (default) = filled disc; > 0 = hollow ring.
    optional uint32 border_width = 5;
}

// Single-line text widget that mirrors the most recent line written to
// the device's log sink (see firmware/main/log_line.{h,cpp}). The
// trackpad, screen registry, and any other subsystem that wants to
// surface activity to the user calls `log_line_post(...)`; every
// LogLine on the active screen updates synchronously.
//
// Purely a viewer — no Actions, no host round-trip.
message LogLine {
}

// A single widget inside a `Screen`. `id` is an opaque host-chosen string
// that follows the widget into events; the device stores it via
// `lv_obj_set_user_data` and copies it into the `user_data` field of
// every event the widget emits.
message Widget {
    string id    = 1;
    // Visual styling: zero or more `Style` messages, each tagged with the
    // state / part selector it targets via `Style.for_state`. Stacked in
    // order via `lv_obj_add_style`; see the `Style` doc-comment.
    repeated Style styles = 3;
    bool centered = 5;
    // Placement: set `rect` for absolute/flex layouts, `cell` for GRID.
    oneof layout {
        Rect     rect = 2;   // absolute position / size
        GridCell cell = 4;   // GRID column / row placement
    }
    oneof kind {
        Button   button   = 10;
        Label    label    = 11;
        Slider   slider   = 12;
        Switch   toggle   = 13;
        Image    image    = 14;
        Arc      arc      = 15;
        Spacer   spacer   = 16;
        Checkbox checkbox = 17;
        Trackpad trackpad = 18;
        LogLine  log      = 19;
        ImageButton image_button = 20;
    }
}



// One on-device LVGL screen. The encoded `Screen` is what lives in
// /from_host/screens/<name>.pb.
message Screen {
    // Wire-format version of the `Screen` message. The device rejects (and
    // deletes) any saved `.pb` file whose `version` field is not `CURRENT`.
    // Increment `CURRENT` whenever a wire-incompatible change is made to
    // `Screen`, `Widget`, or any message they reference.
    //
    // Values lower than `CURRENT` are treated as stale; the file is removed
    // from the device filesystem so the host re-uploads a fresh copy.
    enum Version {
        VERSION_UNKNOWN = 0;   // proto3 default — any file without a version field
        CURRENT         = 8;   // current wire format
    }

    // Must equal `CURRENT`; the firmware deletes and ignores files that
    // carry a different value (including the proto3 default of 0, which
    // is produced by old host code that did not set this field).
    Version version = 6;
    string name = 1;   // must match the filename stem
    oneof layout {
        LayoutAbsolute absolute = 2;
        LayoutFlex     flex     = 3;
        LayoutGrid     grid     = 4;
    }
    repeated Widget widgets = 5;
}
