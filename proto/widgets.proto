// SPDX-License-Identifier: GPL-3.0-or-later
//
// Widget / screen layout types for the Touchy-Pad declarative UI system.
//
// These messages describe LVGL screens authored on the host and uploaded to
// the device via streamed `FileOpenWrite`/`FileWrite`/`FileClose` (see
// `touchy.proto`). The device decodes them from `F:host/s/<name>.pb`
// files using nanopb; the host DSL in `app/src/touchy_pad/screens.py`
// serialises them using protobuf-python.
//
// See docs/why-not-xml.md for the rationale behind protobuf over XML.

syntax = "proto3";

package touchy;

// ---------------------------------------------------------------------------
// Stage 15 ŌĆö declarative screen layouts (host-uploaded, on-device rendered)
// ---------------------------------------------------------------------------
//
// A `Screen` describes a single LVGL screen as a flat list of `Widget`s
// plus an optional `Layout`. The host serialises one `Screen` per file
// and streams it to the device under `F:host/s/<name>.pb`; the
// device caches the encoded bytes and instantiates LVGL objects when
// `ScreenLoadCmd("F:host/s/<name>.pb")` arrives.
//
// See docs/why-not-xml.md for the rationale behind protobuf over XML.

// Pixel-space placement. When the parent screen has Layout.kind == ABSOLUTE
// (the default) all four fields are honoured; under ROW/COL/GRID, only `w`
// and `h` are used (a zero value means "size to content").
message Rect {
    int32 x = 1;
    int32 y = 2;
    int32 w = 3;
    int32 h = 4;
}

// LVGL event codes ŌĆö mirrors lv_event_code_t from
// firmware/managed_components/lvgl__lvgl/src/misc/lv_event.h.
//
// LvEvent.code is always one of these values; host-side code (Python,
// Rust) should compare against this enum rather than hardcoded integers.
// The numeric values are fixed by LVGL and must track the firmware's
// LVGL version.
enum LvEventCode {
    // Catch-all sentinel ŌĆö never forwarded as a real event.
    ALL = 0;

    // ---- Input device events ----
    PRESSED             =  1;  // touch/click starts
    PRESSING            =  2;  // held (sent continuously)
    PRESS_LOST          =  3;  // pressed but finger slid off
    SHORT_CLICKED       =  4;  // short tap, not scrolled
    SINGLE_CLICKED      =  5;
    DOUBLE_CLICKED      =  6;
    TRIPLE_CLICKED      =  7;
    LONG_PRESSED        =  8;  // held Ōēź long_press_time
    LONG_PRESSED_REPEAT =  9;
    CLICKED             = 10;  // released after non-scroll press
    RELEASED            = 11;  // always sent on release

    // ---- Scroll / gesture ----
    SCROLL_BEGIN        = 12;
    SCROLL_THROW_BEGIN  = 13;
    SCROLL_END          = 14;
    SCROLL              = 15;
    GESTURE             = 16;
    KEY                 = 17;
    ROTARY              = 18;

    // ---- Focus ----
    FOCUSED             = 19;
    DEFOCUSED           = 20;
    LEAVE               = 21;
    HIT_TEST            = 22;
    INDEV_RESET         = 23;
    HOVER_OVER          = 24;
    HOVER_LEAVE         = 25;

    // ---- Drawing (not forwarded to host in normal operation) ----
    COVER_CHECK         = 26;
    REFR_EXT_DRAW_SIZE  = 27;
    DRAW_MAIN_BEGIN     = 28;
    DRAW_MAIN           = 29;
    DRAW_MAIN_END       = 30;
    DRAW_POST_BEGIN     = 31;
    DRAW_POST           = 32;
    DRAW_POST_END       = 33;
    DRAW_TASK_ADDED     = 34;

    // ---- Special / state ----
    VALUE_CHANGED       = 35;  // slider, switch, checkbox changed
    INSERT              = 36;
    REFRESH             = 37;
    READY               = 38;
    CANCEL              = 39;
    STATE_CHANGED       = 40;

    // ---- Object lifecycle ----
    CREATE              = 41;
    DELETE              = 42;
    CHILD_CHANGED       = 43;
    CHILD_CREATED       = 44;
    CHILD_DELETED       = 45;
    SCREEN_UNLOAD_START = 46;
    SCREEN_LOAD_START   = 47;
    SCREEN_LOADED       = 48;
    SCREEN_UNLOADED     = 49;
    SIZE_CHANGED        = 50;
    STYLE_CHANGED       = 51;
    LAYOUT_CHANGED      = 52;
    GET_SELF_SIZE       = 53;

    // ---- Display / render pipeline ----
    INVALIDATE_AREA          = 54;
    RESOLUTION_CHANGED       = 55;
    COLOR_FORMAT_CHANGED     = 56;
    REFR_REQUEST             = 57;
    REFR_START               = 58;
    REFR_READY               = 59;
    RENDER_START             = 60;
    RENDER_READY             = 61;
    FLUSH_START              = 62;
    FLUSH_FINISH             = 63;
    FLUSH_WAIT_START         = 64;
    FLUSH_WAIT_FINISH        = 65;
    UPDATE_LAYOUT_COMPLETED  = 66;
    VSYNC                    = 67;
    VSYNC_REQUEST            = 68;
}

// LVGL style selector bits. A `Style.for_state` value is the bitwise OR
// of any combination of these constants, and is passed verbatim to
// `lv_obj_add_style(obj, st, selector)` on the device.
//
// The enum is a flattened union of two distinct LVGL concepts:
//
//   * STATE_* bits (0x0000..0x00FF, plus the user-state bits LVGL
//     reserves at 0x1000..0x8000) describe widget state ŌĆö PRESSED,
//     FOCUSED, DISABLED, etc. Multiple state bits can be OR'd together to
//     describe complex states (e.g. PRESSED | FOCUSED).
//   * PART_* bits (0x010000..0x0F0000) pick which sub-part of a composite
//     widget the style targets (the slider knob, the scrollbar, ...).
//     They are not states, but LVGL packs them into the same
//     `lv_style_selector_t` so they can be OR'd onto a state mask in the
//     same `for_state` field.
//
// `STATE_DEFAULT == 0` and `PART_MAIN == 0`, so leaving `for_state` unset
// (proto3 zero) means "apply to the main part in the default state" ŌĆö
// the most common case.
//
// See https://lvgl.io/docs/open/common-widget-features/styles/overview
// for the full state-precedence and part-selection rules.
enum LvState {
    option allow_alias = true;
    // ---- states (lv_state_t) ----
    STATE_DEFAULT   = 0x0000;
    STATE_CHECKED   = 0x0001;
    STATE_FOCUSED   = 0x0002;
    STATE_FOCUS_KEY = 0x0004;
    STATE_EDITED    = 0x0008;
    STATE_HOVERED   = 0x0010;
    STATE_PRESSED   = 0x0020;
    STATE_SCROLLED  = 0x0040;
    STATE_DISABLED  = 0x0080;
    // User states (custom) intentionally omitted ŌĆö add when needed.
    // ---- parts (lv_part_t) ----
    PART_MAIN       = 0x000000;
    PART_SCROLLBAR  = 0x010000;
    PART_INDICATOR  = 0x020000;
    PART_KNOB       = 0x030000;
    PART_SELECTED   = 0x040000;
    PART_ITEMS      = 0x050000;
    PART_CURSOR     = 0x060000;
    PART_ANY        = 0x0F0000;
}

// Curated subset of `lv_style_prop_t` values that a `Transition` may
// interpolate. Wire IDs are stable; the firmware translates each into
// the matching `LV_STYLE_*` constant at decode time so the wire format
// stays insulated from LVGL version drift / `LV_USE_*` build flags.
enum StyleProp {
    UNSET             = 0;
    BG_COLOR          = 1;
    BG_OPA            = 2;
    RADIUS            = 3;
    BORDER_WIDTH      = 4;
    BORDER_COLOR      = 5;
    // Per-side pad props. LVGL has no single "all sides" transition
    // prop; pad-everywhere transitions need all four entries.
    PAD_TOP           = 6;
    TEXT_COLOR        = 7;
    IMAGE_RECOLOR     = 8;
    IMAGE_RECOLOR_OPA = 9;
    TRANSFORM_WIDTH   = 10;
    TRANSFORM_HEIGHT  = 11;
    PAD_BOTTOM        = 12;
    PAD_LEFT          = 13;
    PAD_RIGHT         = 14;
    // Stage 59 ŌĆö geometry / opacity props for declarative `Animation`s.
    X                 = 15;
    Y                 = 16;
    WIDTH             = 17;
    HEIGHT            = 18;
    OPA               = 19;
}

// Animation path (easing curve) selector. Maps 1-to-1 onto the
// `lv_anim_path_*` built-ins. Default = LINEAR.
enum AnimPath {
    LINEAR      = 0;
    EASE_IN     = 1;
    EASE_OUT    = 2;
    EASE_IN_OUT = 3;
    OVERSHOOT   = 4;
    BOUNCE      = 5;
    STEP        = 6;
}

// Style-property transition. Mirrors `lv_style_transition_dsc_t`: when
// the parent `Style` is added/removed from a widget's selector match
// (e.g. on entering/leaving `PRESSED`), LVGL animates every
// `prop` in this list from the previous value to the new one along
// `path` over `duration_ms`, starting after `delay_ms`.
//
// The classic "bind on the default style ŌåÆ covers both directions"
// pattern works: attach one Transition to the `for_state = 0` Style
// and LVGL uses it for both press and release. Attach a second
// (different) Transition to the `for_state = PRESSED` Style to
// get an asymmetric in/out animation (fast in, slow out).
//
// See https://lvgl.io/docs/open/main-modules/animation and the
// `lv_example_imagebutton_1` / `lv_example_style_11` examples.
message Transition {
    repeated StyleProp props = 1;       // properties to interpolate
    AnimPath  path           = 2;       // easing; default = LINEAR
    uint32    duration_ms    = 3;
    uint32    delay_ms       = 4;
}

// Stage 59 ŌĆö one animated style property inside an `Animation`.
// `start`/`end` are interpreted as integer values appropriate to `prop`
// (pixels for X/Y/WIDTH/HEIGHT, 0ŌĆō255 for OPA, RGB565/RGB888 ints for
// colour props, etc.). Named `start`/`end` rather than `from`/`to`
// because `from` is a reserved word in Python.
message AnimTrack {
    StyleProp prop  = 1;
    int32     start = 2;
    int32     end   = 3;
}

// Stage 59 ŌĆö declarative LVGL animation: one or more `AnimTrack`s that
// share a single timeline (duration, easing, delay, repeat, ping-pong
// reverse). One `Animation` proto ŌåÆ one `lv_anim_t` per `track` on the
// firmware side, kicked off in parallel when the widget is built.
// Mirrors the `lv_example_anim_1` / red-dot pattern from LVGL's docs.
message Animation {
    repeated AnimTrack tracks          = 1;
    uint32             duration_ms     = 2;   // forward leg duration (>0)
    AnimPath           path            = 3;   // easing; default = LINEAR
    // 0 ŌåÆ infinite repeat (LV_ANIM_REPEAT_INFINITE); N ŌåÆ N total cycles.
    uint32             repeat_count    = 4;
    uint32             repeat_delay_ms = 5;   // pause between cycles
    bool               reverse         = 6;   // ping-pong back to `start`
    uint32             reverse_delay_ms    = 7;
    uint32             reverse_duration_ms = 8;   // 0 ŌåÆ same as duration_ms
    uint32             start_delay_ms      = 9;   // one-shot pre-roll
}

// Cosmetic overrides applied to a widget via an `lv_style_t` instance
// and `lv_obj_add_style(obj, st, for_state)`. Treat one `Style` message
// as Ōēł one `lv_style_t`: each populated scalar maps to one
// `lv_style_set_<prop>()` call; fields left unset are skipped and
// inherit the theme's value.
//
// Every visual field is `optional` so an explicit zero (e.g.
// `bg_color = 0x000000`, `transform_width = 0`) round-trips faithfully
// instead of being indistinguishable from "unset".
//
// `for_state` is the `lv_style_selector_t` selector passed to
// `lv_obj_add_style`. It is the OR of any `LvState` (state + part) bits;
// leaving it unset targets PART_MAIN / STATE_DEFAULT (selector = 0).
//
// Stack multiple `Style` messages on a single `Widget.styles` to attach
// different properties to different states / parts (e.g. one Style for
// the default look, another with `for_state = PRESSED` to
// change the background while pressed). Later entries win on ties;
// state precedence still applies as documented by LVGL.
//
// Colours are packed 0xRRGGBB; the top byte is ignored.
message Style {
    optional uint32 bg_color        = 1;
    optional int32  radius          = 2;
    optional int32  border_w        = 3;
    optional int32  pad             = 4;
    optional uint32 text_color      = 5;
    // Bitwise OR of `LvState` values; 0 = PART_MAIN | STATE_DEFAULT.
    uint32          for_state       = 6;
    // image recolor (0xRRGGBB) ŌĆö used to tint icons / image buttons.
    optional uint32 recolor         = 7;
    // image recolor opacity, 0..255 (255 = full tint). LVGL `LV_OPA_*`
    // constants are valid (e.g. 76 Ōēł `LV_OPA_30`).
    optional uint32 recolor_opa     = 8;
    // pixels added to the widget's drawn width while this style is
    // active; commonly negative for "shrink on press" or positive for
    // "grow on press". Maps to `lv_style_set_transform_width`.
    optional int32  transform_width = 9;
    // Animate the listed properties when this style is added / removed
    // from the widget's selector match. See `Transition` doc-comment.
    optional Transition transition  = 10;
    // Border opacity, 0..255 (e.g. 102 Ōēł LV_OPA_40).
    optional uint32 border_opa      = 11;
    // Border colour, 0xRRGGBB.
    optional uint32 border_color    = 12;
    // Shadow width (blur radius) in pixels.
    optional int32  shadow_width    = 13;
    // Shadow colour, 0xRRGGBB.
    optional uint32 shadow_color    = 14;
    // Shadow Y offset in pixels.
    optional int32  shadow_offset_y = 15;
    // Outline opacity, 0..255.
    optional uint32 outline_opa     = 16;
    // Outline colour, 0xRRGGBB.
    optional uint32 outline_color   = 17;
    // Outline width in pixels.
    optional int32  outline_width   = 18;
    // Horizontal scale in 1/256 units; 256 = 100% (LV_SCALE_NONE), 192 = 75%.
    // Maps to `lv_style_set_transform_scale_x`.
    optional int32  transform_scale_x = 19;
    // Vertical scale in 1/256 units; 256 = 100% (LV_SCALE_NONE), 192 = 75%.
    // Maps to `lv_style_set_transform_scale_y`.
    optional int32  transform_scale_y = 20;
}

// Single device-side keystroke step inside an `ActionMacro`.
//
// `keycode` is a raw USB HID usage code from page 0x07 (Keyboard / Keypad);
// see https://usb.org/sites/default/files/hut1_22.pdf for the full table.
// `modifiers` is the standard 8-bit modifier mask sent in byte 0 of the
// boot-keyboard report:
//     bit 0: LCTRL  bit 1: LSHIFT  bit 2: LALT   bit 3: LGUI
//     bit 4: RCTRL  bit 5: RSHIFT  bit 6: RALT   bit 7: RGUI
message KeyEvent {
    uint32 keycode   = 1;
    uint32 modifiers = 2;
}

// Relative motion step inside an `ActionMacro`. Used for mouse-cursor
// moves (`MacroStep.mouse_move`), scroll-wheel moves
// (`MacroStep.scroll_move`), and zoom (`MacroStep.zoom_move`); the
// enclosing step decides which HID report it drives. Both components are
// signed and `optional`: when a `Move` inside a `Trackpad`
// `on_move` / `on_scroll` / `on_zoom_*` action leaves an axis
// unset, the firmware substitutes the trackpad's live per-frame delta for
// that axis (so the macro just says "emit a move" without hard-coding a
// magnitude).
message Move {
    optional int32 dx = 1;
    optional int32 dy = 2;
}

// A single step inside an `ActionMacro`. Steps run in order on a dedicated
// macro task; between any two steps the runner waits for the currently-
// configured per-step delay (default 10 ms; see `set_delay_ms`).
message MacroStep {
    oneof step {
        KeyEvent  key_down          = 1;   // press only ŌĆö chord setup
        KeyEvent  key_up            = 2;   // release only ŌĆö chord teardown
        KeyEvent  key_tap           = 3;   // down then up
        uint32    mouse_button_down = 4;   // bitmask: L=1,R=2,M=4
        uint32    mouse_button_up   = 5;
        uint32    mouse_click       = 6;   // down then up
        Move      mouse_move        = 7;   // relative cursor motion
        // Update the sticky inter-step delay (ms). Applies to every step
        // *after* this one until the next `set_delay_ms`.
        uint32    set_delay_ms      = 8;
        // One-shot extra pause (ms). Does not affect the sticky delay.
        uint32    delay_ms          = 9;
        // Relative scroll-wheel motion: dy ŌåÆ vertical wheel, dx ŌåÆ
        // horizontal pan. Same `Move` ambient-delta semantics as
        // `mouse_move`.
        Move      scroll_move       = 10;
        // Relative zoom: `dx` (Relative X) carries the signed zoom
        // magnitude (+ = zoom in, - = zoom out). Same ambient-delta
        // semantics as `mouse_move` / `scroll_move` ŌĆö an unset `dx` inside
        // a `Trackpad` `on_zoom_*` action pulls the live per-frame span
        // change. Device HID mapping: Ctrl held + vertical scroll by `dx`
        // (the de-facto desktop zoom gesture).
        Move      zoom_move         = 11;
    }
}

// A device-side macro: a list of HID keyboard / mouse events with delays.
// Replays entirely on the device ŌĆö no host round-trips.
message ActionMacro {
    repeated MacroStep steps = 1;   // see widgets.options for caps
}

// A host-handled action: the device forwards an `LvEvent` with the
// originating widget's id in `user_data`, `code` in `host_code`, and any
// relevant per-widget value (slider position, switch state, ...) packed
// into `extra`. The host library dispatches on `host_code` to a registered
// Python callback.
message ActionHost {
    uint32 code = 1;
}

// Special-cased on-device behaviours. Like ActionMacro this runs
// entirely on the firmware (no host round-trip), but instead of
// replaying HID events the device interprets the chosen sub-message
// and changes its own state (rebinding a `WidgetRef` to a different
// widget file, etc.).
message ActionDevice {
    oneof kind {
        ActionChangeWidgetRef change_widget_ref = 1;
    }
}

// Stage 57 ŌĆö retarget a `WidgetRef`-bearing widget in the currently
// loaded screen to a different widget file. The change lives in RAM
// only; reloading the screen reverts to the originally-encoded path.
//
// `target_id` is matched against the outer `Widget.id` of the ref
// (i.e. the id set on the Widget whose `kind` is `widget_ref`). If no
// ref with that id is currently visible the action is logged and
// dropped.
//
//   * BY_PATH (default): `path` is a full drive-prefixed path to a
//     widget `.pb` file (e.g. `F:host/w/trackpad.pb`). The ref is
//     rebound to that path.
//   * NEXT / PREVIOUS: `path` is a *directory* (e.g. `F:host/w/`).
//     The firmware enumerates `*.pb` files in that directory in
//     lexicographic order, finds the ref's current path among them,
//     and steps ┬▒1 (wrapping at the ends). If the current path is
//     not in that directory the firmware picks the first entry and
//     logs a WARN.
//
// Combined with `Button`s carrying labels like "Next" / "Previous" and
// a single ref widget in the content area this gives users a no-code
// way to build paged UIs while keeping persistent chrome on screen.
//
// Stage 86 ŌĆö the two IMAGE_BUTTON_* behaviours repurpose the same
// `target_id` + `path` fields to retarget the image source of an
// `ImageButton` *in place* (no widget rebuild), via the Stage 60 image
// registry:
//
//   * IMAGE_BUTTON_RELEASED: `target_id` is the `ImageButton`'s own
//     `Widget.id`; `path` is a drive-prefixed image asset (e.g. a
//     cached `R:host/icache/<hash>.bin`). The button's *released*-state
//     image is repointed at `path`. If that slot is currently displayed
//     (the button is not being pressed) the change is visible at once;
//     otherwise it takes effect when the finger lifts.
//   * IMAGE_BUTTON_PRESSED: same, for the *pressed*-state image.
//
message ActionChangeWidgetRef {
    enum Behavior {
        BY_PATH               = 0;
        NEXT                  = 1;
        PREVIOUS              = 2;
        IMAGE_BUTTON_RELEASED = 3;
        IMAGE_BUTTON_PRESSED  = 4;
    }
    Behavior behavior  = 1;
    string   path      = 2;   // file path (BY_PATH) or directory (NEXT/PREV)
    string   target_id = 3;   // outer Widget.id of the WidgetRef to mutate
}

// Behaviour attached to a widget event trigger (click / value changed /
// ...). Each widget event slot holds a list of Actions; the device runs
// them in order. Mixing host-, macro- and device-actions in one list is
// fine.
message Action {
    oneof kind {
        ActionHost   host   = 1;
        ActionMacro  macro  = 2;
        ActionDevice device = 3;
    }
}

// Absolute (default) layout: every child widget is positioned exactly
// where its `Widget.placement.rect` says. Children without a `rect`
// default to (0, 0) with "size-to-content" dimensions.
//
// Stage 24.2: layout variants are themselves widgets (see
// `Widget.kind.layout_*`), so each one carries its own `Layout` child
// list rather than a parallel widget array on the enclosing screen.
message LayoutAbsolute {
    Layout layout = 1;
}

// Flex layout (lv_obj_set_flex_flow). `flow` selects the LVGL flex
// flow mode; `gap` sets the pixel gap between children.
message LayoutFlex {
    // Maps 1-to-1 onto lv_flex_flow_t.
    enum Flow {
        ROW                 = 0;
        COLUMN              = 1;
        ROW_WRAP            = 2;
        ROW_REVERSE         = 3;
        ROW_WRAP_REVERSE    = 4;
        COLUMN_WRAP         = 5;
        COLUMN_REVERSE      = 6;
        COLUMN_WRAP_REVERSE = 7;
    }
    Flow   flow   = 1;
    uint32 gap    = 2;    // pixels between children
    Layout layout = 3;
}

// Grid layout (lv_obj_set_layout(ŌĆ”, LV_LAYOUT_GRID)).
//
//   * `cols` columns, each LV_GRID_FR(1) wide. 0 ŌåÆ treated as 1.
//   * `rows` rows, each LV_GRID_FR(1) tall. 0 ŌåÆ single content-sized row.
//   * `gap` pixels between all tracks.
//
// Every child should carry `Widget.placement.cell`; children without one
// land in (col=0, row=0) with span 1├Ś1.
message LayoutGrid {
    uint32 cols   = 1;
    uint32 rows   = 2;    // 0 = CONTENT-sized single row track
    uint32 gap    = 3;    // pixels between tracks
    Layout layout = 4;
}

// Shared "container of widgets" used by every layout variant
// (`LayoutAbsolute` / `LayoutFlex` / `LayoutGrid`). Pulled out into its
// own message so the children list is described in exactly one place
// and so nanopb's FT_POINTER decoration for it lives in one place too
// (see `proto/widgets.options`).
//
// Stage 24.2 ŌĆö replaces the old `Screen` widget arrays; every layout
// variant now carries its own `Layout`.
message Layout {
    repeated Widget children = 1;
}

// Grid placement for a widget whose parent uses Layout.kind == GRID.
// `col_span` / `row_span` default to 1 when absent. Widgets without a
// `GridCell` land in (col=0, row=0) with span 1x1.
message GridCell {
    uint32 col               = 1;
    uint32 row               = 2;
    optional uint32 col_span = 3;   // absent ŌåÆ 1
    optional uint32 row_span = 4;   // absent ŌåÆ 1
}

// ----- Widget kinds -----
//
// Each kind carries only the attributes that need to round-trip from the
// authoring DSL. Visual styling lives on the enclosing `Widget.style`;
// placement on `Widget.layout` (rect or cell).

message Button {
    string text             = 1;
    repeated Action on_click = 2;   // see widgets.options for max count
    // Press/release edge actions. `on_click` fires once on a completed
    // press+release (suppressed if the press is cancelled by
    // scroll/press-lost). `on_press` / `on_release` fire on the raw
    // edges, so they're suitable for hold-aware host code (e.g.
    // StreamDeck plugins, MIDI note-on / note-off). PRESS_LOST
    // also triggers `on_release` so callers always see a matching
    // press/release pair. The host distinguishes which edge fired by
    // checking `LvEvent.code` against `LvEventCode` enum values:
    // PRESSED=1, CLICKED=10, RELEASED=11,
    // PRESS_LOST=3.
    repeated Action on_press   = 3;  // see widgets.options for max count
    repeated Action on_release = 4;  // see widgets.options for max count
}

// Text alignment within a label widget. Maps directly to lv_text_align_t.
enum TextAlign {
    AUTO   = 0;  // follow LVGL default / locale direction
    LEFT   = 1;
    CENTER = 2;
    RIGHT  = 3;
}

message Label {
    string text      = 1;
    // 0 = theme default. Otherwise: closest available Montserrat size
    // compiled into the firmware (see CONFIG_LV_FONT_MONTSERRAT_* in
    // firmware/sdkconfig.defaults).
    int32     font_size  = 2;
    TextAlign text_align = 3;
}

message Slider {
    int32  min                = 1;
    int32  max                = 2;
    int32  value              = 3;
    repeated Action on_change = 4;
}

message Switch {
    bool   on                 = 1;
    repeated Action on_change = 2;
}

message Checkbox {
    string text               = 1;
    bool   checked            = 2;
    repeated Action on_change = 3;
}



message Image {
    // Alignment of an image within its bounding box. Mirrors lv_image_align_t.
    // Numeric values match the LVGL enum so the firmware can cast directly.
    // The value 10 (_LV_IMAGE_ALIGN_AUTO_TRANSFORM) is an internal LVGL marker
    // and is intentionally omitted.
    enum Align {
        DEFAULT      = 0;   // LVGL default (top-left for unscaled images)
        TOP_LEFT     = 1;
        TOP_MID      = 2;
        TOP_RIGHT    = 3;
        BOTTOM_LEFT  = 4;
        BOTTOM_MID   = 5;
        BOTTOM_RIGHT = 6;
        LEFT_MID     = 7;
        RIGHT_MID    = 8;
        CENTER       = 9;
        STRETCH      = 11;  // fill widget area, ignoring aspect ratio
        TILE         = 12;  // tile to fill widget area
        CONTAIN      = 13;  // fit within area, keeping aspect ratio
        COVER        = 14;  // fill area, keeping aspect ratio (may crop)
    }

    // Drive-prefixed LVGL path to a previously-uploaded image, e.g.
    // "F:host/images/avatar.bin" (persistent flash) or
    // "R:host/images/avatar.bin" (transient PSRAM). Passed verbatim to
    // `lv_image_set_src`. The firmware always supports its native LVGL
    // `.bin` format; other decoders (BMP/PNG/JPG) require the matching
    // `LV_USE_*` flag in sdkconfig.
    string path = 1;
    // Scale factor in 1/256 units (256 = 100%, 512 = 2x, 128 = 50%).
    // Mapped to `lv_image_set_scale`. When unset, the image is rendered
    // at its native size.
    optional uint32 scale = 2;
    // Rotation in tenths of a degree, clockwise (1800 = 180┬░).
    // Mapped to `lv_image_set_rotation`. When unset, no rotation is
    // applied (LVGL default).
    optional int32 rotation = 3;
    // Alignment within the widget's bounding box.
    // Mapped to `lv_image_set_align`. When unset, CENTER is used.
    optional Align align = 4;
}

// Clickable image. Like `Button` (with `on_click` actions) but renders an
// image asset instead of a styled text label. The released-state image
// is described by an embedded `Image` (so it accepts `asset` / `scale`
// / `rotation`). `pressed` is an optional `Image` shown while the
// button is held ŌĆö omit it to leave the LVGL PRESSED state unset (LVGL
// then renders the released image while pressed). `pressed` can carry
// its own `scale` / `rotation` so e.g. a button can shrink slightly on
// press.
message ImageButton {
    Image released                 = 1;   // required ŌĆö at minimum `asset`
    optional Image pressed         = 2;   // optional press-state image
    repeated Action on_click       = 3;   // see widgets.options for cap
    // Press/release edge actions ŌĆö same semantics as on `Button`. See
    // the comment on `Button.on_press` / `Button.on_release` for the
    // edge-vs-click contract and which `LvEvent.code` values fire.
    repeated Action on_press       = 4;   // see widgets.options for cap
    repeated Action on_release     = 5;   // see widgets.options for cap
}

message Arc {
    int32 min   = 1;
    int32 max   = 2;
    int32 value = 3;
}

message Spacer {
}

// Multitouch trackpad surface. Touches inside the widget are converted to
// gestures on-device (one-finger drag -> move, 1/2/3-finger tap ->
// left/right/middle click, two-finger drag -> scroll). Each gesture runs
// a list of Actions (Stage 90): the `on_*` fields below. The host DSL
// seeds them with the obvious USB-HID mouse defaults, but callers can
// override any gesture (e.g. bind a tap to a macro or host event). An
// empty list disables that gesture.
//
// To see live gesture feedback, place a `LogLine` somewhere on the
// same screen; the trackpad pushes a short status line on every
// recognised gesture to the shared device log sink.
//
// Optional eye-candy: `touch_ripple` / `tap_ripple` spawn an animated
// circle at each finger position. Ripple color is picked at spawn time
// from the *_touch_color fields based on the current finger count
// (1ŌåÆleft, 2ŌåÆright, 3+ŌåÆmiddle), matching the click convention.
message Trackpad {
    // Invert the vertical scroll direction for two-finger drag.
    // Default (false) means dragging fingers downward scrolls content down
    // (Linux/Windows style). Set true for macOS "natural scrolling" where
    // fingers-down scrolls content up.
    bool scroll_invert_y = 1;
    // Invert the horizontal scroll / pan direction for two-finger drag.
    // Default (false) means fingers-right pans content right.
    bool scroll_invert_x = 2;

    // Ripple colors (0xRRGGBB). Picked at ripple-spawn time by the *current*
    // finger count when a new finger lands, or by the tap's finger count
    // when a tap is recognised. Unset ŌåÆ built-in defaults
    // (cyan / orange / magenta).
    optional uint32 left_touch_color   = 3;  // 1-finger / left-click
    optional uint32 right_touch_color  = 4;  // 2-finger / right-click
    optional uint32 middle_touch_color = 5;  // 3+-finger / middle-click

    // Animation spawned at each new finger touch-down. Unset ŌåÆ disabled.
    optional RippleAnimation touch_ripple = 6;
    // Burst animation spawned at the centroid of the touched fingers
    // when a tap (no-drag, short-hold) is recognised on release. Unset
    // ŌåÆ disabled. Typically a larger / brighter / ring-style ripple so
    // taps visibly punctuate the press.
    optional RippleAnimation tap_ripple   = 7;

    // Color (0xRRGGBB) of the scroll-progress bar that animates onto
    // the trackpad edge when a two-finger scroll begins. Unset ŌåÆ
    // scrollbar animation disabled. Vertical scrolls grow a 4px-wide
    // bar from the right edge; horizontal scrolls grow a 4px-tall bar
    // from the bottom edge.
    optional uint32 scrollbar_color = 8;

    // Maximum hold time, in milliseconds, for a touch to still be
    // counted as a tap (versus a drag) when all fingers are released.
    // Default: 200 ms. Range is host-defined; very large values let
    // long-presses still register as taps.
    optional uint32 tap_max_ms = 9;

    // Stage 90 ŌĆö gesture ŌåÆ Action bindings. The trackpad recognises a
    // gesture device-side and runs the matching action list (in order),
    // exactly like `Button.on_click`. An **empty** list means the
    // gesture does nothing ŌĆö the host DSL is responsible for populating
    // sensible defaults (the standard HID click / move / scroll macros).
    //
    // Click lists run through the normal (async) macro runner. The
    // motion lists (`on_move` / `on_scroll`) run through a synchronous,
    // delay-free inline runner because they fire on every touch frame;
    // a `Move` step inside them with unset `dx`/`dy` picks up the
    // trackpad's live per-frame delta (see `Move`).
    repeated Action on_left_click   = 10;  // 1-finger tap
    repeated Action on_middle_click = 11;  // 3+-finger tap
    repeated Action on_right_click  = 12;  // 2-finger tap
    repeated Action on_move         = 13;  // one-finger drag
    repeated Action on_scroll       = 14;  // two-finger drag

    // Stage 91 ŌĆö single-finger *swipe* (directional flick) gestures.
    //
    // The whole swipe engine is gated on `swipe_initial_distance`:
    // unset ŌåÆ swipe detection is disabled entirely (zero per-frame
    // cost). When set, a swipe is recognised when a single finger
    // travels at least `swipe_initial_distance` px within
    // `swipe_initial_time` ms, moving within `swipe_angle` degrees of an
    // axis. The dominant axis + sign pick the direction (left/right/
    // up/down) and the matching `on_*_swipe` list runs via the same
    // synchronous inline runner as `on_move` ŌĆö a `Move` step with unset
    // dx/dy picks up the relative swipe travel.
    //
    // If `swipe_consecutive_distance` is set, the gesture repeats: after
    // the initial recognition the engine re-anchors at the recognition
    // point, locks the axis/direction, and keeps emitting the same swipe
    // each time the finger clears `swipe_consecutive_distance` px within
    // `swipe_consecutive_time` ms ŌĆö a continuous stream for one motion.
    // Unset ŌåÆ exactly one event per touch.
    optional uint32 swipe_initial_distance     = 15;  // px ŌĆö master switch
    optional uint32 swipe_initial_time         = 16;  // ms; unset ŌåÆ default
    optional uint32 swipe_consecutive_distance = 17;  // px; unset ŌåÆ single
    optional uint32 swipe_consecutive_time     = 18;  // ms; unset ŌåÆ default
    optional uint32 swipe_angle                = 19;  // deg; unset ŌåÆ default
    repeated Action on_left_swipe   = 20;
    repeated Action on_right_swipe  = 21;
    repeated Action on_up_swipe     = 22;
    repeated Action on_down_swipe   = 23;

    // Stage 92 ŌĆö two-finger *zoom* (pinch) gestures.
    //
    // Gated on `zoom_initial_distance` exactly like swipe: unset ŌåÆ zoom
    // detection is off (zero per-frame cost). When set, a zoom is
    // recognised when the distance *between the two touch points* (the
    // span) changes by at least `zoom_initial_distance` px within
    // `zoom_initial_time` ms. The sign of the span change picks the
    // direction ŌĆö spreading apart (positive) runs `on_zoom_in`, pinching
    // together (negative) runs `on_zoom_out` ŌĆö via the same inline runner
    // as `on_scroll`. The magnitude is reported in Relative X (`dx`), so a
    // `zoom_move` / `scroll_move` / `mouse_move` step with unset `dx`
    // picks up the signed span change. The axis along which the fingers
    // move is irrelevant.
    //
    // If `zoom_consecutive_distance` is set the gesture repeats: after the
    // initial recognition the engine re-anchors at the recognition span,
    // locks the direction, and keeps emitting the same zoom each time the
    // span clears `zoom_consecutive_distance` px within
    // `zoom_consecutive_time` ms. Switching direction (inŌåöout) requires the
    // span to re-clear the full `zoom_initial_distance` the other way.
    // Unset ŌåÆ exactly one event per touch.
    optional uint32 zoom_initial_distance     = 24;  // px ŌĆö master switch
    optional uint32 zoom_initial_time         = 25;  // ms; unset ŌåÆ default
    optional uint32 zoom_consecutive_distance = 26;  // px; unset ŌåÆ single
    optional uint32 zoom_consecutive_time     = 27;  // ms; unset ŌåÆ default
    repeated Action on_zoom_in      = 28;  // fingers spreading (positive)
    repeated Action on_zoom_out     = 29;  // fingers pinching (negative)
}

// Reusable touch-feedback ripple. Animates a circle from radius 0 ŌåÆ
// `max_radius` while fading its opacity from `start_opa` ŌåÆ 0 over
// `duration_ms`. Color is *not* part of this message ŌĆö the parent
// widget (e.g. Trackpad) supplies it at spawn time so the same
// RippleAnimation can be reused across gestures with different colors.
message RippleAnimation {
    optional uint32 start_opa    = 1;  // 0-255; default 200
    optional uint32 max_radius   = 2;  // px;    default 40
    optional uint32 duration_ms  = 3;  // ms;    default 350
    AnimPath        path         = 4;  // easing; default LINEAR
    // Border thickness in px. 0 (default) = filled disc; > 0 = hollow ring.
    optional uint32 border_width = 5;
}

// Single-line text widget that mirrors the most recent line written to
// the device's log sink (see firmware/main/log_line.{h,cpp}). The
// trackpad, screen registry, and any other subsystem that wants to
// surface activity to the user calls `log_line_post(...)`; every
// LogLine on the active screen updates synchronously.
//
// Purely a viewer ŌĆö no Actions, no host round-trip.
message LogLine {
}

// Live frames-per-second readout for the active LVGL display.
//
// Renders as a small label that the firmware refreshes ~twice per
// second with the value reported by `lv_display_get_refresh_period`
// (i.e. how fast LVGL is currently flushing). Intended for profiling
// ŌĆö drop one onto a screen while iterating on layouts to see the
// cost of expensive widgets (transitions, ripples, image scaling).
//
// Purely a viewer ŌĆö no Actions.
message Fps {
}

// Dev / benchmarking toggle. Renders as an LVGL checkbox labelled
// "Force". While checked, the firmware schedules a fast LV timer that
// invalidates the active screen each tick, forcing LVGL to redraw
// continuously at the display's maximum rate. Pair with `Fps` to read
// off a worst-case frames-per-second number for the current screen.
//
// When unchecked the timer is removed and rendering returns to LVGL's
// usual on-demand behaviour. Multiple ForceRender widgets on one
// screen all share the same global "force" state ŌĆö checking any one
// of them turns it on; unchecking the last one turns it off.
//
// No Actions ŌĆö its on_change effect is purely on-device.
message ForceRender {
}

// Stage 54 ŌĆö indirection: a `Widget` whose contents live in a
// separate `.pb` file on the device filesystem. The device reads the
// file, decodes a `Widget` message out of it, and splices the result
// into the parent layout in place of this ref. Conventionally the
// host writes referenced widgets to `X:host/w/<name>.pb` where
// `X` is a valid drive letter (`F:` = LittleFS, `R:` = RamFs).
// Widget pb files can be updated by the host and the device will auto
// redraw just that portion of the screen.
//
// The outer `Widget.id` (the id on the widget whose `kind` is
// `widget_ref`) is the addressing key for Stage 57's
// `ActionChangeWidgetRef`; set it to a unique value when you want an
// action to rebind this ref at runtime. Inner widgets keep their own
// ids for event routing as usual.
message WidgetRef {
    // Drive-prefixed path to the serialized `Widget` (e.g.
    // `"R:host/w/key0.pb"`). Empty paths are skipped with a WARN.
    string path = 1;
}

// A single widget inside a `Layout`. `id` is an opaque host-chosen string
// that follows the widget into events; the device stores it via
// `lv_obj_set_user_data` and copies it into the `user_data` field of
// every event the widget emits.
//
// Stage 24.2: the three layout variants (`LayoutAbsolute` / `LayoutFlex`
// / `LayoutGrid`) are themselves `Widget.kind` choices, so a `Widget`
// can be either a leaf control (button / label / trackpad / ŌĆ”) or a
// container that arranges its own `Layout.children`.
message Widget {
    // Stage 56 ŌĆö wire-format version. Only the *root* `Widget` of an
    // on-disk `.pb` file carries this; nested children leave it at
    // `VERSION_UNKNOWN` (proto3 default). The device validates the
    // root widget's `version` field on file load and deletes the file
    // on mismatch.
    //
    // For screen files (`F:host/s/<name>.pb`) the root is
    // `Screen.active`, so `screen.active.version` must equal
    // `CURRENT`. For standalone widget files
    // (`{F,R}:host/widgets/<name>.pb`, see `WidgetRef`) the top-level
    // `Widget` itself carries the version. Increment `CURRENT`
    // whenever a wire-incompatible change is made to `Widget`,
    // `Screen`, or any message they reference.
    enum Version {
        VERSION_UNKNOWN = 0;   // proto3 default / nested child widgets
        CURRENT         = 23;
    }
    Version version = 6;

    string id    = 1;
    // Visual styling: zero or more `Style` messages, each tagged with the
    // state / part selector it targets via `Style.for_state`. Stacked in
    // order via `lv_obj_add_style`; see the `Style` doc-comment.
    repeated Style styles = 3;
    bool centered = 5;
    // Stage 59 ŌĆö declarative animations. Each `Animation` runs in
    // parallel on `this` widget for the lifetime of the LVGL object;
    // see the `Animation` doc-comment.
    repeated Animation animations = 7;
    // Stage 72 ŌĆö per-axis "grow to fill" opt-in. Honoured for widgets that
    // are children of a flex (ROW/COLUMN) or grid layout; ignored under an
    // absolute parent (there `Rect.w`/`h` already control size). Independent
    // of the `placement` oneof below ŌĆö a widget grows the same way whether
    // it is placed via `rect` (flex) or `cell` (grid).
    //
    // The default (0) leaves the widget content-sized on that axis ŌĆö so a
    // button shrinks to its label instead of stretching to fill its slot.
    //
    //   * Flex *main* axis (grow_x for ROW, grow_y for COLUMN): a value > 0
    //     is a true `lv_obj_set_flex_grow` factor ŌĆö children share the
    //     parent's free main-axis space in proportion to their factors.
    //   * Flex *cross* axis (grow_y for ROW, grow_x for COLUMN) and *grid*
    //     (both axes): LVGL has no proportional per-child grow there, so
    //     any value > 0 simply means "fill" ŌĆö `lv_pct(100)` under flex,
    //     `LV_GRID_ALIGN_STRETCH` under grid. The magnitude is ignored.
    int32 grow_x = 8;
    int32 grow_y = 9;
    // Where this widget sits inside its parent layout. `rect` is used by
    // absolute and flex parents; `cell` by grid parents. Renamed from
    // `layout` in Stage 24.2 to disambiguate from the layout-widget
    // kinds below (which manage *this widget's* children, not its
    // placement).
    oneof placement {
        Rect     rect = 2;   // absolute / flex position + size
        GridCell cell = 4;   // grid column / row placement
    }
    oneof kind {
        Button   button   = 10;
        Label    label    = 11;
        Slider   slider   = 12;
        Switch   toggle   = 13;
        Image    image    = 14;
        Arc      arc      = 15;
        Spacer   spacer   = 16;
        Checkbox checkbox = 17;
        Trackpad trackpad = 18;
        LogLine  log      = 19;
        ImageButton image_button = 20;
        Fps      fps      = 21;
        ForceRender force_render = 22;

        // Layout-widget kinds (Stage 24.2). A layout widget contains a
        // `Layout` of children and tells LVGL how to arrange them.
        LayoutAbsolute layout_absolute = 30;
        LayoutFlex     layout_flex     = 31;
        LayoutGrid     layout_grid     = 32;

        // Stage 54 ŌĆö indirection: the actual widget lives in a
        // separate `.pb` file on the device filesystem. See
        // `WidgetRef` above.
        WidgetRef widget_ref = 33;
    }
}



// Stage 24.1 / 24.2 ŌĆö `Screen` is just a name + four LVGL layers, each
// of which is a single `Widget` (almost always a layout-widget kind
// carrying its own children).
//
// An LVGL display has four stacked screens that render in z-order:
// `bottom`, the active screen, `top`, and `sys`. See
// https://lvgl.io/docs/open/main-modules/display/screen_layers ŌĆö the
// non-active layers are NOT cleared when `lv_screen_load()` is called,
// so widgets placed on them persist across screen switches.
//
// One on-device LVGL screen. The encoded `Screen` is what lives in
// F:host/s/<name>.pb.
message Screen {
    // Stage 56 ŌĆö the wire-format version field lives on `Widget`
    // (only the root widget of each file carries it). For screen
    // files that's `active.version`; the firmware validates it on
    // load and deletes the file on mismatch.

    // The active LVGL screen (what `lv_screen_load` swaps in). Authoring
    // code that doesn't think about LVGL layers should put everything
    // here ŌĆö this is where the bulk of every UI lives. Almost always a
    // layout-widget (`Widget.kind.layout_*`) carrying its own children.
    Widget active = 7;

    // Optional layers stacked above / below the active screen. Each one
    // maps onto an LVGL layer object: `top` ŌåÆ `lv_layer_top()`,
    // `sys` ŌåÆ `lv_layer_sys()`, `bottom` ŌåÆ `lv_layer_bottom()`.
    //
    // Persistence semantics: LVGL never auto-clears these layers when a
    // new screen is loaded. The firmware honours that by only touching a
    // layer when the incoming `Screen` actually carries it ŌĆö if `top`
    // is unset on the new screen, the previous screen's `top` widgets
    // stay on screen. To clear a layer, send an explicit empty `Widget`
    // for it (`top = Widget()`), which the device materialises as an
    // empty `LayoutAbsolute` container.
    optional Widget top    = 8;
    optional Widget sys    = 9;
    optional Widget bottom = 10;
}
