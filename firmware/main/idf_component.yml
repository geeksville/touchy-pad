# Board-agnostic dependencies for touchy-pad v2.
# Per-board deps (esp_lcd_touch_gt911, panel drivers, etc.) live in
# boards/<board>/board/idf_component.yml.
dependencies:
  idf: ">=5.3"

  # LVGL graphics library (v9.5+).
  lvgl/lvgl: "~9.5.0"

  # Bridge between esp_lcd / esp_lcd_touch and LVGL (creates the display +
  # indev objects, runs the LVGL task, anti-tearing, etc).
  espressif/esp_lvgl_port: "^2.3.0"

  # TinyUSB wrapper – HID mouse interface (v2.x has a new API). Only pulled
  # in for chips with native USB-OTG (the esp32s2 / esp32s3); the classic
  # ESP32 has no USB peripheral, so the component must not be required there.
  # The IDF target is set per-board (boards/<board>/target), so this rule
  # tracks the same esp32-vs-esp32s3 split as CONFIG_SOC_USB_OTG_SUPPORTED.
  espressif/esp_tinyusb:
    version: "^2.2.0"
    rules:
      - if: "target in [esp32s2, esp32s3, esp32p4]"

  # Common esp_lcd_touch abstraction; touch.h uses esp_lcd_touch_handle_t.
  # Concrete drivers (GT911 etc.) live in board-specific idf_component.yml.
  espressif/esp_lcd_touch: "^1.1"

  # nanopb C runtime for the host_api custom USB protocol (stage 13). The
  # protobuf .pb.c/.pb.h files are generated from proto/touchy.proto by
  # `just build-proto-c` and live at proto/touchy.pb.{c,h} (gitignored).
  # `livekit/nanopb` is a thin repackage of upstream nanopb 0.4.9 wired up
  # as an IDF component; matches the generator version we use locally.
  livekit/nanopb: "^0.4.9"

  # LittleFS filesystem on the `storage` partition. Used by FlashFs
  # (fs.cpp) to persist host-uploaded layouts and images under
  # /littlefs/host and device prefs under /littlefs/prefs (see
  # docs/design.md stages 14 and 51).
  joltwallet/littlefs: "^1.21.1"

  # Stage lb8 — mDNS advertisement for the WiFi network command API.
  # Only meaningful when CONFIG_TOUCHY_WIFI is on (WiFi-capable chips);
  # harmless to pull in otherwise. esp_wifi / esp_http_server /
  # esp_https_server / esp-tls are built-in IDF components (declared in
  # CMakeLists REQUIRES), so only mDNS needs the component manager.
  espressif/mdns: "^1.2"

  # Stage lb13 — cJSON for the JSON variant of the network command API
  # (net/json.cpp). IDF 6 moved cJSON out of core into the managed
  # registry; the REQUIRES name is the namespaced `espressif__cjson`.
  espressif/cjson: "^1.7.19"
