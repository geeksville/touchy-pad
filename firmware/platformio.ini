; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Per https://github.com/sivar2311/ESP32-PlatformIO-Flash-and-PSRAM-configurations?tab=readme-ov-file#esp32-s3-wroom-11u-n16r8 I need the following options
; Flash: 16MB QD, PSRAM: 8MB OT
; Platform/framework pinned to arduino-esp32 3.0.2 to match the working LVGL example:
; https://github.com/antoinec4/waveshare_7in_LVLG_platformIO
[env:esp32-s3-devkitc-1]
#platform = espressif32
platform = https://github.com/platformio/platform-espressif32.git#develop
platform_packages =
    platformio/framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.2
    platformio/framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.2/esp32-arduino-libs-3.0.2.zip
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
#monitor_rts = 0
#monitor_dtr = 0
# upload_speed = 115200
; Use hardware ID so the port is found regardless of ACM number assigned at boot
# upload_port = hwgrep://303A:1001
# monitor_port = hwgrep://303A:1001

board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

# Note: use ARDUINO_USB_CDC_ON_BOOT=1 to route debug printing via the CDC device, otherwise it goes to the 
# device marked "UART1" on the board.  For development, use the "UART1" connector on the waveshare for
# programming and debug output.  Use the "USB" connector for the USB HID device output

build_flags =
    -I include
    -DCORE_DEBUG_LEVEL=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DLV_COLOR_16_SWAP=0
    -DESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED=1
    -DBOARD_WAVESHARE_ESP32_S3_TOUCH_LCD_7
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM

#     -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git
    https://github.com/esp-arduino-libs/esp-lib-utils.git
    https://github.com/lvgl/lvgl.git#v8.4.0
