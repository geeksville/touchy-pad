; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Per https://github.com/sivar2311/ESP32-PlatformIO-Flash-and-PSRAM-configurations?tab=readme-ov-file#esp32-s3-wroom-11u-n16r8 I need the following options
; Flash: 16MB QD, PSRAM: 8MB OT
[env]
#platform = espressif32
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip

#platform = https://github.com/platformio/platform-espressif32.git#develop
#v6.13.0
#platform_packages =
#    platformio/framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.2
#    platformio/framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.2/esp32-arduino-libs-3.0.2.zip
#platform_packages =
#    platformio/framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.3.8
#    platformio/framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.3.8/esp32-arduino-libs-3.3.8.zip

board = BOARD_WAVESHARE_ESP32_S3_TOUCH_LCD_7
# was esp32-s3-devkitc-1, which was fine but I want to start customizing the board JSON
framework = arduino 
 
monitor_speed = 115200
#monitor_rts = 0
#monitor_dtr = 0
# upload_speed = 115200
; Use hardware ID so the port is found regardless of ACM number assigned at boot
# upload_port = hwgrep://303A:1001
# monitor_port = hwgrep://303A:1001
#upload_port = hwgrep://1a86:55d3
#monitor_port = hwgrep://1a86:55d3
upload_port = /host/dev/ttyACM1
monitor_port = /host/dev/ttyACM1

#upload_protocol = esp-builtin
#debug_tool = esp-builtin
#debug_speed = 1000
debug_init_break = tbreak setup
build_type = debug

monitor_filters = 
  esp32_exception_decoder

#debug_init_cmds =
#  set remotetimeout 5
#  target extended-remote $DEBUG_PORT
#  $LOAD_CMDS
#  $INIT_BREAK

#tboard_build.arduino.memory_type = qio_opi
#board_build.flash_mode = qio
#board_build.psram_type = opi
#board_upload.flash_size = 16MB
#board_upload.maximum_size = 16777216
#board_build.partitions = default_16MB.csv

# Note: use ARDUINO_USB_CDC_ON_BOOT=1 to route debug printing via the CDC device, otherwise it goes to the 
# device marked "UART1" on the board.  For development, use the "UART1" connector on the waveshare for
# programming and debug output.  Use the "USB" connector for the USB HID device output

build_flags =
    -I include
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DLV_COLOR_16_SWAP=0
    -DESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED=1
    -DARDUINO_USB_MODE=1
    -DUSE_TINYUSB
    -DCONFIG_TINYUSB_ENABLED
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DOVERIDE_USB_VID=0x4403
    -DOVERIDE_USB_PID=0x1002
    -DUSB_MANUFACTURER='"Geeksville"'

# -DUSB_VID=0x1234
# -DUSB_PID=0x5678
# -DUSB_MANUFACTURER='"MyCustomCompany"'
# -DUSB_PRODUCT='"MyCustomDevice"'

#     -DCORE_DEBUG_LEVEL=1
#     -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git
    https://github.com/esp-arduino-libs/esp-lib-utils.git
    https://github.com/lvgl/lvgl.git#v8.4.0


; https://github.com/antoinec4/waveshare_7in_LVLG_platformIO
[env:waveshare7]

build_flags =
    ${env.build_flags}
    -DBOARD_WAVESHARE_ESP32_S3_TOUCH_LCD_7
